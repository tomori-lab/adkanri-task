  .modal-field select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
  .modal-task-body { background: linear-gradient(135deg, rgba(59,130,246,.06), rgba(139,92,246,.06)); border: 1.5px solid rgba(59,130,246,.25); border-left: 4px solid var(--accent); border-radius: 10px; padding: 16px 18px; margin-bottom: 20px; max-height: 220px; overflow-y: auto; white-space: pre-wrap; font-size: 14px; line-height: 1.8; color: var(--text); word-break: break-word; }
  .modal-btn-row { display: flex; gap: 10px; margin-top: 8px; }
  .modal-btn-save { flex: 1; padding: 13px; background: var(--accent); color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity .2s; }
  .modal-btn-save:hover { opacity: .88; }
  .modal-btn-done { flex: 0 0 auto; padding: 13px 24px; background: var(--green); color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity .2s; white-space: nowrap; }
  .modal-btn-done:hover { opacity: .88; }

  .req-container { max-width: 640px; margin: 0 auto; padding: 24px 16px 60px; }

  .req-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
  .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .cat-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; font-size: 15px; font-weight: 600; color: var(--text); cursor: pointer; text-align: left; line-height: 1.4; transition: all .2s; }
  .cat-btn:hover { border-color: var(--accent); background: rgba(59,130,246,.08); }

  .req-field select, .req-field input, .req-field textarea { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; font-family: inherit; color: var(--text); background: var(--surface2); }

<script src="config.js"></script>
<script>
// ============================
// Config
// ============================
var API_BASE = (typeof API_URL !== 'undefined' && API_URL) ? API_URL : '';

// ============================
// Theme
// ============================
function toggleTheme() {
  var isLight = document.documentElement.classList.toggle("light");
  document.getElementById("themeToggle").textContent = isLight ? "\u2600\uFE0F" : "\uD83C\uDF19";
  localStorage.setItem("theme", isLight ? "light" : "dark");
}
(function() {
  if (localStorage.getItem("theme") === "light") {
    document.documentElement.classList.add("light");
    document.addEventListener("DOMContentLoaded", function() {
      document.getElementById("themeToggle").textContent = "\u2600\uFE0F";
    });
  }
})();

function toggleSidebar() {
  var sb = document.getElementById("sidebar");
  var btn = document.getElementById("sidebarOpen");
  sb.classList.toggle("collapsed");
  btn.style.display = sb.classList.contains("collapsed") ? "inline-flex" : "none";
}

// ============================
// Auth
// ============================
var authToken = null;
var currentUser = null;
var userRole = "user";

function decodeJwt(token) {
  var payload = token.split(".")[1];
  return JSON.parse(atob(payload.replace(/-/g, "+").replace(/_/g, "/")));
}

var silentRefreshInProgress = false;

function isTokenExpired() {
  if (!authToken) return true;
  try { return Date.now() / 1000 > decodeJwt(authToken).exp - 60; } catch(e) { return true; }
}

function reAuthenticate() {
  document.getElementById("authOverlay").classList.remove("hidden");
  if (typeof google !== "undefined" && google.accounts) google.accounts.id.prompt();
}

function trySilentRefresh() {
  if (silentRefreshInProgress) return;
  silentRefreshInProgress = true;
  if (typeof google !== "undefined" && google.accounts && google.accounts.id) {
    google.accounts.id.prompt(function(notification) {
      silentRefreshInProgress = false;
      if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
        reAuthenticate();
      }
    });
  } else {
    silentRefreshInProgress = false;
    reAuthenticate();
  }
}

function apiCall(method, path, body) {
  if (isTokenExpired()) {
    var savedUser = localStorage.getItem("userInfo");
    if (savedUser) {
      trySilentRefresh();
      return Promise.reject(new Error("トークン更新中"));
    }
    reAuthenticate();
    return Promise.reject(new Error("ログインが必要です"));
  }
  var opts = { method: method, headers: { "Authorization": "Bearer " + authToken, "Content-Type": "application/json" } };
  if (body && method !== "GET" && method !== "DELETE") opts.body = JSON.stringify(body);
  return fetch(API_BASE + path, opts).then(function(res) {
    return res.json().then(function(data) {
      if (res.status === 401) { trySilentRefresh(); throw new Error(data.error || "ログインが必要です"); }
      if (!res.ok) throw new Error(data.error || "エラーが発生しました");
      return data;
    });
  });
}

function applyAuth(token) {
  authToken = token;
  var payload = decodeJwt(authToken);
  currentUser = { email: payload.email, name: payload.name || payload.email, picture: payload.picture || null };
  localStorage.setItem("userInfo", JSON.stringify(currentUser));
  document.getElementById("sidebarUser").textContent = currentUser.email;
  var avatar = document.getElementById("userAvatar");
  if (currentUser.picture) {
    avatar.innerHTML = '<img src="' + currentUser.picture + '" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">';
  } else {
    avatar.textContent = (currentUser.name || "?").charAt(0).toUpperCase();
  }
  avatar.title = currentUser.name;
  document.getElementById("authOverlay").classList.add("hidden");
}

function handleCredentialResponse(response) {
  localStorage.setItem("authToken", response.credential);
  applyAuth(response.credential);
  checkRole();
}

(function restoreSession() {
  var saved = localStorage.getItem("authToken");
  if (saved) {
    try {
      var payload = decodeJwt(saved);
      if (Date.now() / 1000 < payload.exp - 60) {
        applyAuth(saved);
        checkRole();
        return;
      }
    } catch (_) {}
  }
  var savedUser = localStorage.getItem("userInfo");
  if (savedUser) {
    try {
      currentUser = JSON.parse(savedUser);
      document.getElementById("sidebarUser").textContent = currentUser.email;
      var avatar = document.getElementById("userAvatar");
      if (currentUser.picture) {
        avatar.innerHTML = '<img src="' + currentUser.picture + '" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">';
      } else {
        avatar.textContent = (currentUser.name || "?").charAt(0).toUpperCase();
      }
      avatar.title = currentUser.name;
    } catch (_) {}
    trySilentRefresh();
    return;
  }
  reAuthenticate();
})();

async function checkRole() {
  try {
    var data = await apiCall("POST", "/api/role", {});
    userRole = data.role;
    applyRole();
    if (data.firstSetup) switchPage("admin");
  } catch (e) {
    userRole = "user";
    applyRole();
  }
}

function applyRole() {
  var layout = document.querySelector(".app-layout");
  if (userRole === "admin") { layout.classList.add("is-admin"); } else { layout.classList.remove("is-admin"); }
}

function initGoogleSignIn() {
  if (!GOOGLE_CLIENT_ID) return;
  function tryInit() {
    if (typeof google === "undefined" || !google.accounts) { setTimeout(tryInit, 200); return; }
    google.accounts.id.initialize({
      client_id: GOOGLE_CLIENT_ID,
      callback: handleCredentialResponse,
      auto_select: true,
    });
    google.accounts.id.renderButton(document.getElementById("googleSignInLarge"), { theme: "filled_blue", size: "large", shape: "pill", text: "signin_with", locale: "ja" });
    google.accounts.id.prompt();
  }
  tryInit();
}

function selectCategory(id) {
  var cat = CATEGORIES.find(function(c) { return c.id === id; });
  reqState.categoryId = cat.id;
  reqState.categoryLabel = cat.label;
  reqState.subCategoryId = "";
  reqState.subCategoryLabel = "";
  document.querySelectorAll(".cat-btn").forEach(function(b) { b.classList.toggle("active", b.dataset.id === id); });
  var subs = SUB_CATEGORIES[id];
  var stepNum = document.querySelector("#reqStep3 .req-step-num");
  if (subs && subs.length > 1) {
    renderSubCategories(subs);
    show("reqStep2"); hide("reqStep3"); hide("submitArea");
    if (stepNum) stepNum.textContent = "3";
  } else if (subs && subs.length === 1) {
    hide("reqStep2");
    if (stepNum) stepNum.textContent = "3";
    selectSubCategory(subs[0].id);
  } else {
    hide("reqStep2");
    if (stepNum) stepNum.textContent = "2";
    if (FIELDS[id]) {
      reqState.subCategoryId = id;
      reqState.subCategoryLabel = "";
      renderFormFields(FIELDS[id]);
      show("reqStep3"); show("submitArea");
    } else { hide("reqStep3"); hide("submitArea"); }
  }
}

function renderSubCategories(subs) {

function selectSubCategory(id) {
  var sub = Object.values(SUB_CATEGORIES).flat().find(function(s) { return s.id === id; });

  reqState.subCategoryId = sub.id;
  reqState.subCategoryLabel = sub.label;

function renderFormFields(fields) {
  var container = document.getElementById("detailFields");
  container.innerHTML = "";
  fields.forEach(function(f) {
    var div = document.createElement("div");
    div.className = "req-field";
    div.id = "field-" + f.id;
    var inputHtml;
    if (f.type === "select") {
      inputHtml = '<select id="input-' + f.id + '" data-label="' + f.label + '" data-required="' + f.required + '"><option value="">選択してください</option>' + f.options.map(function(o) { return '<option value="' + o + '">' + o + '</option>'; }).join("") + '</select>';
    } else if (f.type === "sheet-select") {
      inputHtml = '<select id="input-' + f.id + '" data-label="' + f.label + '" data-required="' + f.required + '"><option value="">読み込み中...</option></select>';
      loadSheetOptions(f.sheetId, f.sheetRange, "input-" + f.id, f.condRange, f.condValue, f.condReplace);
    } else if (f.type === "textarea") {
      inputHtml = '<textarea id="input-' + f.id + '" data-label="' + f.label + '" data-required="' + f.required + '" placeholder="' + f.label + 'を入力"></textarea>';
    } else {
      inputHtml = '<input type="' + (f.type || "text") + '" id="input-' + f.id + '" data-label="' + f.label + '" data-required="' + f.required + '" placeholder="' + f.label + 'を入力">';
    }
    div.innerHTML = '<label for="input-' + f.id + '">' + f.label + (f.required ? '<span class="required">*</span>' : "") + '</label>' + inputHtml;
    container.appendChild(div);
  });
}

function loadSheetOptions(sheetId, range, selectId, condRange, condValue, condReplace) {
  var params = "/api/sheet-options?id=" + encodeURIComponent(sheetId) + "&range=" + encodeURIComponent(range);
  if (condRange) params += "&condRange=" + encodeURIComponent(condRange) + "&condValue=" + encodeURIComponent(condValue || "") + "&condReplace=" + encodeURIComponent(condReplace || "");
  apiCall("GET", params)
    .then(function(options) {
      var sel = document.getElementById(selectId);
      if (!sel) return;
      sel.innerHTML = '<option value="">選択してください</option>' + options.map(function(o) { return '<option value="' + esc(o) + '">' + esc(o) + '</option>'; }).join("") + '<option value="__manual__">その他（手動入力）</option>';
      sel.addEventListener("change", function() {
        if (this.value === "__manual__") {
          var inp = document.createElement("input");
          inp.type = "text"; inp.id = selectId; inp.placeholder = "手動で入力";
          inp.dataset.label = sel.dataset.label; inp.dataset.required = sel.dataset.required;
          inp.style.cssText = "width:100%;";
          sel.replaceWith(inp);
          inp.focus();
        }
      });
    })
    .catch(function() {
      var sel = document.getElementById(selectId);
      if (sel) sel.innerHTML = '<option value="">取得失敗 - 手動入力してください</option>';
    });
}

function handleRequestSubmit() {
  if (!currentUser) { reAuthenticate(); return; }
  var valid = true;
  document.querySelectorAll(".error-msg").forEach(function(e) { e.remove(); });
  document.querySelectorAll(".field-error").forEach(function(e) { e.classList.remove("field-error"); });
  document.querySelectorAll("#detailFields input, #detailFields select, #detailFields textarea").forEach(function(inp) {
    if (inp.dataset.required === "true" && !inp.value.trim()) {
      valid = false;
      var field = inp.closest(".req-field");
      field.classList.add("field-error");
      var err = document.createElement("div");
      err.className = "error-msg";
      err.textContent = inp.dataset.label + "は必須です";
      field.appendChild(err);
    }
  });
  if (!valid) return;

  var btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>送信中...';

  var fields = [];
  document.querySelectorAll("#detailFields input, #detailFields select, #detailFields textarea").forEach(function(inp) {
    fields.push({ label: inp.dataset.label, value: inp.value });
  });

  apiCall("POST", "/api/submit", { name: currentUser.email, category: reqState.categoryLabel, subCategory: reqState.subCategoryLabel, fields: fields })
    .then(function(result) {
      if (result.success) { hide("reqFormScreen"); show("reqSuccessScreen"); }
      else { alert("送信に失敗しました: " + (result.error || "")); btn.disabled = false; btn.textContent = "送信する"; }
    }).catch(function(err) { alert("エラー: " + err.message); btn.disabled = false; btn.textContent = "送信する"; });
}

function resetRequestForm() {
  reqState = { categoryId: "", categoryLabel: "", subCategoryId: "", subCategoryLabel: "" };
  document.querySelectorAll(".cat-btn").forEach(function(b) { b.classList.remove("active"); });
  hide("reqStep2"); hide("reqStep3"); hide("submitArea");
  document.getElementById("detailFields").innerHTML = "";
  document.getElementById("submitBtn").disabled = false;
  document.getElementById("submitBtn").textContent = "送信する";
  hide("reqSuccessScreen"); show("reqFormScreen");
}

async function loadMyRequests() {
  var area = document.getElementById("myRequestsArea");
  area.innerHTML = '<div class="empty-state">読み込み中...</div>';
  try {
    var tasks = await apiCall("GET", "/api/my-requests");
    if (!Array.isArray(tasks) || tasks.length === 0) {
      area.innerHTML = '<div class="empty-state">依頼はまだありません</div>';
      return;
    }
    function statusClass(s) { return s === "完了" ? "done" : s === "着手中" ? "progress" : s === "相手待ち" ? "waiting" : "pending"; }
    var html = '<table class="req-table"><thead><tr><th>内容</th><th>依頼者</th><th>担当</th><th>日付</th><th>進捗</th></tr></thead><tbody>';
    tasks.forEach(function(t) {
      html += '<tr>';
      html += '<td>' + esc(t.category) + (t.subCategory ? " / " + esc(t.subCategory) : "") + '</td>';
      html += '<td>' + esc(t.requester || "-") + '</td>';
      html += '<td>' + esc(t.assignee || "-") + '</td>';
      html += '<td>' + esc(t.createdAt || "") + '</td>';
      html += '<td><span class="req-status ' + statusClass(t.status) + '">' + esc(t.status || "未着手") + '</span></td>';
      html += '</tr>';
    });
    html += "</tbody></table>";
    area.innerHTML = html;
  } catch (err) {
    area.innerHTML = '<div class="empty-state">読み込みに失敗しました: ' + esc(err.message) + "</div>";
  }
}

function renderUserRoleList() {

  var users = adminData.users || [];

    area.innerHTML = '<div style="color:var(--text2);font-size:12px;">ログイン済みのユーザーがいません</div>';
    return;
  }
  var html = '<table class="user-role-table"><thead><tr><th>ユーザー</th><th>メール</th><th>権限</th></tr></thead><tbody>';
  users.forEach(function(u) {
    var isAdmin = admins.includes(u.email);
    var initial = (u.name || "?").charAt(0).toUpperCase();
    html += '<tr>';
    html += '<td class="ur-user"><div class="ur-avatar">';
    if (u.picture) { html += '<img src="' + esc(u.picture) + '">'; }
    else { html += '<span>' + esc(initial) + '</span>'; }
    html += '</div><span class="ur-name">' + esc(u.name || u.email) + '</span></td>';
    html += '<td class="ur-email">' + esc(u.email) + '</td>';
    html += '<td><label class="role-switch"><input type="checkbox"' + (isAdmin ? ' checked' : '') + ' onchange="toggleAdminRole(\'' + esc(u.email) + '\',this.checked)"><span class="role-slider"></span><span class="role-label">' + (isAdmin ? '管理者' : 'ユーザー') + '</span></label></td>';
    html += '</tr>';
  });

async function toggleAdminRole(email, makeAdmin) {
  try {
    var admins = (adminData.admins || []).slice();
    if (makeAdmin && !admins.includes(email)) {
      admins.push(email);
    } else if (!makeAdmin) {
      admins = admins.filter(function(e) { return e !== email; });
    }
    await apiCall("POST", "/api/admin/roles", { admins: admins });
    adminData.admins = admins;
    renderUserRoleList();
  } catch (e) { alert("権限変更に失敗しました"); }
}

// ============================
// 定期タスク: complete + recurrence
// ============================
var FREQ_LABELS = { daily: "毎日", weekly: "毎週", biweekly: "隔週", monthly: "毎月" };
var WEEKDAY_NAMES = ["日","月","火","水","木","金","土"];

function getFreqLabel(freq) {
  if (!freq) return "毎月";
  if (freq.startsWith("weekday:")) return "毎週" + WEEKDAY_NAMES[parseInt(freq.split(":")[1])] + "曜日";
  if (freq.startsWith("monthday:")) return "毎月" + freq.split(":")[1] + "日";
  return FREQ_LABELS[freq] || freq;
}

function calculateNextDue(frequency) {
  var d = new Date();
  if (frequency && frequency.startsWith("weekday:")) {
    var targetDay = parseInt(frequency.split(":")[1]);
    var current = d.getDay();
    var diff = targetDay - current;
    if (diff <= 0) diff += 7;
    d.setDate(d.getDate() + diff);
    return d.toISOString().slice(0, 10);
  }
  if (frequency && frequency.startsWith("monthday:")) {
    var targetDate = parseInt(frequency.split(":")[1]);
    d.setMonth(d.getMonth() + 1);
    var lastDay = new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
    d.setDate(Math.min(targetDate, lastDay));
    return d.toISOString().slice(0, 10);
  }
  switch (frequency) {
    case "daily": d.setDate(d.getDate() + 1); break;
    case "weekly": d.setDate(d.getDate() + 7); break;
    case "biweekly": d.setDate(d.getDate() + 14); break;
    case "monthly": d.setMonth(d.getMonth() + 1); break;
  }
  return d.toISOString().slice(0, 10);
}

function checkTeikiRecurrence(t) {
  if (t.status === "done" && t.nextDue && new Date(today()) >= new Date(t.nextDue)) {
    t.status = "open";
    t.completedAt = null;
    t.nextDue = null;
    updateTask(t.id, "status", "open");
    updateTask(t.id, "completedAt", null);
    updateTask(t.id, "nextDue", null);
  }
}

async function toggleTeikiComplete(id) {
  var t = allTasks.find(function(x) { return x.id === id; });
  if (!t) return;
  if (t.status === "done") {
    t.status = "open"; t.completedAt = null; t.nextDue = null;
    await apiCall("POST", "/api/dashboard/tasks/" + id, { status: "open", completedAt: null, nextDue: null });
  } else {
    var nd = calculateNextDue(t.frequency || "monthly");
    t.status = "done"; t.completedAt = today(); t.nextDue = nd;
    await apiCall("POST", "/api/dashboard/tasks/" + id, { status: "done", completedAt: today(), nextDue: nd });
  }
  renderAll();
}

function renderTeikiCard(t) {
  checkTeikiRecurrence(t);
  var isDone = t.status === "done";
  var freqDisplay = '<span class="freq-badge">' + getFreqLabel(t.frequency) + '</span>';
  var noteHtml = t.note ? '<div class="card-body" style="margin-top:4px;font-size:12px;color:var(--text2);">' + esc(t.note) + '</div>' : '';
  var assigneeHtml = t.assigneeName ? '<div style="font-size:11px;color:var(--text2);margin-top:4px;">担当: ' + esc(t.assigneeName) + '</div>' : '';
  return '<div class="card' + (isDone ? ' teiki-done' : '') + '" onclick="openTeikiModal(\'' + t.id + '\')"><div class="card-top"><button class="teiki-check' + (isDone ? ' done' : '') + '" onclick="event.stopPropagation();toggleTeikiComplete(\'' + t.id + '\')">' + (isDone ? '✓' : '') + '</button><div class="card-title" style="margin-left:8px;">' + esc(t.title) + '</div>' + freqDisplay + '<button class="delete-task-btn" onclick="event.stopPropagation();deleteManualTask(\'' + t.id + '\')" title="削除">🗑️</button></div>' + assigneeHtml + noteHtml + (isDone && t.nextDue ? '<div class="next-due">次回: ' + t.nextDue + '</div>' : '') + '</div>';
}

function openTeikiModal(id) {
  var t = allTasks.find(function(x) { return x.id === id; });
  if (!t) return;
  currentModalId = id;
  document.getElementById("modalTitle").textContent = t.title;
  var metaHtml = '<span>' + getFreqLabel(t.frequency) + '</span>';
  metaHtml += '<span>' + (t.status === "done" ? "完了" : "未完了") + '</span>';
  if (t.nextDue) metaHtml += '<span>次回: ' + t.nextDue + '</span>';
  document.getElementById("modalMeta").innerHTML = metaHtml;

  var bodyHtml = '<div class="modal-form-group"><label>頻度変更</label>';
  bodyHtml += '<div class="freq-type-tabs"><button type="button" class="freq-tab' + (!t.frequency || (!t.frequency.startsWith("weekday:") && !t.frequency.startsWith("monthday:")) ? ' active' : '') + '" data-type="interval" onclick="switchFreqTypeEdit(\'interval\')">間隔</button><button type="button" class="freq-tab' + (t.frequency && t.frequency.startsWith("weekday:") ? ' active' : '') + '" data-type="weekday" onclick="switchFreqTypeEdit(\'weekday\')">曜日</button><button type="button" class="freq-tab' + (t.frequency && t.frequency.startsWith("monthday:") ? ' active' : '') + '" data-type="monthday" onclick="switchFreqTypeEdit(\'monthday\')">日付</button></div>';
  var curInterval = (!t.frequency || FREQ_LABELS[t.frequency]) ? (t.frequency || "monthly") : "monthly";
  bodyHtml += '<div id="freqEditPanel_interval" class="freq-panel' + (t.frequency && (t.frequency.startsWith("weekday:") || t.frequency.startsWith("monthday:")) ? ' hidden' : '') + '"><select id="editFreqInterval"><option value="daily"' + (curInterval==="daily"?" selected":"") + '>毎日</option><option value="weekly"' + (curInterval==="weekly"?" selected":"") + '>毎週</option><option value="biweekly"' + (curInterval==="biweekly"?" selected":"") + '>隔週</option><option value="monthly"' + (curInterval==="monthly"?" selected":"") + '>毎月</option></select></div>';
  var curWeekday = t.frequency && t.frequency.startsWith("weekday:") ? parseInt(t.frequency.split(":")[1]) : -1;
  bodyHtml += '<div id="freqEditPanel_weekday" class="freq-panel' + (t.frequency && t.frequency.startsWith("weekday:") ? '' : ' hidden') + '"><div class="weekday-btns">';
  WEEKDAY_NAMES.forEach(function(name, i) { bodyHtml += '<button type="button" class="weekday-btn' + (curWeekday === i ? ' selected' : '') + '" data-day="' + i + '" onclick="selectWeekdayEdit(this,' + i + ')">' + name + '</button>'; });
  bodyHtml += '</div></div>';
  var curMonthday = t.frequency && t.frequency.startsWith("monthday:") ? parseInt(t.frequency.split(":")[1]) : 1;
  bodyHtml += '<div id="freqEditPanel_monthday" class="freq-panel' + (t.frequency && t.frequency.startsWith("monthday:") ? '' : ' hidden') + '"><select id="editFreqMonthday">';
  for (var md = 1; md <= 31; md++) { bodyHtml += '<option value="' + md + '"' + (curMonthday === md ? ' selected' : '') + '>' + md + '日</option>'; }
  bodyHtml += '</select></div>';
  bodyHtml += '<input type="hidden" id="freqTypeEdit" value="' + (t.frequency && t.frequency.startsWith("weekday:") ? "weekday" : t.frequency && t.frequency.startsWith("monthday:") ? "monthday" : "interval") + '"></div>';

  bodyHtml += '<div class="modal-form-group"><label>備考</label><textarea id="teikiNoteEdit" rows="4" style="padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-size:14px;resize:vertical;font-family:inherit;">' + esc(t.note || '') + '</textarea></div>';
  bodyHtml += '<button class="modal-save-btn" onclick="saveTeikiAll(\'' + id + '\')">保存</button>';
  document.getElementById("modalBody").innerHTML = bodyHtml;
  document.getElementById("modalActions").innerHTML = '';
  document.getElementById("taskModal").classList.remove("hidden");
}

async function saveTeikiAll(id) {
  var t = allTasks.find(function(x) { return x.id === id; });
  if (!t) return;
  var val = document.getElementById("teikiNoteEdit").value.trim();
  t.note = val;
  var ft = document.getElementById("freqTypeEdit");
  var freqType = ft ? ft.value : "interval";
  var newFreq;
  if (freqType === "weekday") {
    var selDay = document.querySelector("#freqEditPanel_weekday .weekday-btn.selected");
    newFreq = selDay ? "weekday:" + selDay.dataset.day : (t.frequency || "weekly");
  } else if (freqType === "monthday") {
    newFreq = "monthday:" + document.getElementById("editFreqMonthday").value;
  } else {
    newFreq = document.getElementById("editFreqInterval").value;
  }
  t.frequency = newFreq;
  await apiCall("POST", "/api/dashboard/tasks/" + id, { note: val, frequency: newFreq });
  renderAll();
  closeModal();
}

function switchFreqTypeEdit(type) {
  document.getElementById("freqTypeEdit").value = type;
  document.querySelectorAll(".freq-tab").forEach(function(b) { b.classList.toggle("active", b.dataset.type === type); });
  ["interval","weekday","monthday"].forEach(function(p) {
    var el = document.getElementById("freqEditPanel_" + p);
    if (el) el.classList.toggle("hidden", p !== type);
  });
}
function selectWeekdayEdit(btn, day) {
  btn.closest(".weekday-btns").querySelectorAll(".weekday-btn").forEach(function(b) { b.classList.remove("selected"); });
  btn.classList.add("selected");
}

async function updateTeikiFreq(id, val) {
  var t = allTasks.find(function(x) { return x.id === id; });
  if (t) { t.frequency = val; await apiCall("POST", "/api/dashboard/tasks/" + id, { frequency: val }); }
}

function switchFreqType(type) {
  document.getElementById("freqType").value = type;
  document.querySelectorAll(".freq-tab").forEach(function(b) { b.classList.toggle("active", b.dataset.type === type); });
  ["interval","weekday","monthday"].forEach(function(p) {
    var el = document.getElementById("freqPanel_" + p);
    if (el) el.classList.toggle("hidden", p !== type);
  });
}
function selectWeekday(btn, day) {
  document.querySelectorAll(".weekday-btn").forEach(function(b) { b.classList.remove("selected"); });
  btn.classList.add("selected");
}

// ============================
// 長期タスク: deadline + todos
// ============================
var STATUS_LABELS_LT = { open: "未着手", in_progress: "着手中", done: "完了" };

function renderLongTermCard(t) {
  var todos = t.todos || [];
  var doneCount = todos.filter(function(x) { return x.status === "done" || x.done; }).length;
  var total = todos.length;
  var pct = total > 0 ? Math.round(doneCount / total * 100) : 0;
  var deadlineStr = t.deadline ? t.deadline : "期日未設定";
  var noteHtml = t.note ? '<div class="card-body" style="margin-top:4px;font-size:12px;color:var(--text2);">' + esc(t.note) + '</div>' : '';
  var assigneeHtml = t.assigneeName ? '<span>担当: ' + esc(t.assigneeName) + '</span>' : '';
  return '<div class="card" onclick="openLongTermModal(\'' + t.id + '\')"><div class="card-top"><div class="card-title">' + esc(t.title) + '</div><button class="delete-task-btn" onclick="event.stopPropagation();deleteManualTask(\'' + t.id + '\')" title="削除">🗑️</button></div><div class="card-meta"><span>' + deadlineStr + '</span><span>' + (STATUS_LABELS_LT[t.status] || "未着手") + '</span>' + assigneeHtml + '</div>' + noteHtml + (total > 0 ? '<div class="todo-progress"><div class="todo-progress-text">やること: ' + doneCount + '/' + total + ' 完了</div><div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div></div>' : '') + '</div>';
}

var TODO_STATUSES = { open: "未着手", in_progress: "着手中", done: "完了" };

function openLongTermModal(id) {
  var t = allTasks.find(function(x) { return x.id === id; });
  if (!t) return;
  currentModalId = id;
  document.getElementById("modalTitle").textContent = t.title;
  var todos = t.todos || [];

  var metaHtml = '<span>' + (t.deadline || "期日未設定") + '</span>';
  metaHtml += '<select class="status-select-inline" onchange="updateLongTermField(\'' + id + '\',\'status\',this.value)">';
  ["open","in_progress","done"].forEach(function(s) {
    metaHtml += '<option value="' + s + '"' + (t.status === s ? ' selected' : '') + '>' + STATUS_LABELS_LT[s] + '</option>';
  });
  metaHtml += '</select>';
  document.getElementById("modalMeta").innerHTML = metaHtml;

  var bodyHtml = '<h3 style="font-size:14px;margin-bottom:10px;color:var(--text);">やること</h3>';
  bodyHtml += '<div class="todo-list" id="todoListArea">';
  if (todos.length === 0) {
    bodyHtml += '<div style="color:var(--text2);font-size:13px;padding:8px 0;">まだ追加されていません</div>';
  }
  todos.forEach(function(item, idx) {
    var isDone = item.status === "done";
    bodyHtml += '<div class="todo-item' + (isDone ? ' todo-done' : '') + '">';
    bodyHtml += '<span class="todo-text">' + esc(item.text) + '</span>';
    bodyHtml += '<input type="date" class="todo-date-input" value="' + (item.date || "") + '" onchange="changeTodoField(\'' + id + '\',' + idx + ',\'date\',this.value)">';
    bodyHtml += '<select class="todo-status-select" onchange="changeTodoField(\'' + id + '\',' + idx + ',\'status\',this.value)">';
    ["open","in_progress","done"].forEach(function(s) {
      bodyHtml += '<option value="' + s + '"' + ((item.status || "open") === s ? ' selected' : '') + '>' + TODO_STATUSES[s] + '</option>';
    });
    bodyHtml += '</select>';
    bodyHtml += '<button class="todo-delete-btn" onclick="removeTodoItem(\'' + id + '\',' + idx + ')" title="削除">🗑️</button>';
    bodyHtml += '</div>';
  });
  bodyHtml += '</div>';
  bodyHtml += '<div class="todo-add"><input type="text" id="todoNewText" placeholder="やることを入力" onkeydown="if(event.key===\'Enter\')addTodoItemLocal(\'' + id + '\')"><button onclick="addTodoItemLocal(\'' + id + '\')">追加</button></div>';
  bodyHtml += '<h3 style="font-size:14px;margin:20px 0 10px;color:var(--text);">備考</h3>';
  bodyHtml += '<textarea id="longTermNoteEdit" rows="3" style="width:100%;box-sizing:border-box;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-size:14px;resize:vertical;font-family:inherit;">' + esc(t.note || '') + '</textarea>';
  bodyHtml += '<button class="modal-save-btn" onclick="saveLongTermTodos(\'' + id + '\')">保存</button>';
  document.getElementById("modalBody").innerHTML = bodyHtml;
  document.getElementById("modalActions").innerHTML = '';
  document.getElementById("taskModal").classList.remove("hidden");
}

function updateLongTermField(id, field, val) {
  var t = allTasks.find(function(x) { return x.id === id; });
  if (t) t[field] = val;
}

function addTodoItemLocal(taskId) {
  var inp = document.getElementById("todoNewText");
  var text = inp.value.trim();
  if (!text) return;
  var t = allTasks.find(function(x) { return x.id === taskId; });
  if (!t) return;
  if (!t.todos) t.todos = [];
  t.todos.push({ text: text, date: today(), status: "open" });
  openLongTermModal(taskId);
}

function changeTodoField(taskId, idx, field, val) {
  var t = allTasks.find(function(x) { return x.id === taskId; });
  if (!t || !t.todos || !t.todos[idx]) return;
  t.todos[idx][field] = val;
}

function removeTodoItem(taskId, idx) {
  var t = allTasks.find(function(x) { return x.id === taskId; });
  if (!t || !t.todos) return;
  t.todos.splice(idx, 1);
  openLongTermModal(taskId);
}

async function saveLongTermTodos(taskId) {
  var t = allTasks.find(function(x) { return x.id === taskId; });
  if (!t) return;
  var noteEl = document.getElementById("longTermNoteEdit");
  if (noteEl) t.note = noteEl.value.trim();
  try {
    await apiCall("POST", "/api/dashboard/tasks/" + taskId, { status: t.status, todos: t.todos || [], note: t.note || "" });
    renderAll();
    closeModal();
  } catch (e) { alert("保存に失敗しました: " + e.message); }
}

function renderSection(title, tasks, dotColor, categoryKey) {
  if (!tasks.length && categoryKey !== "teiki" && categoryKey !== "long_term") return "";
  var addBtn = (categoryKey === "teiki" || categoryKey === "long_term") ? '<button class="add-task-btn" onclick="addManualTask(\'' + categoryKey + '\')">＋ 追加</button>' : '';
  var body = viewMode === "list" && categoryKey !== "teiki" && categoryKey !== "long_term"
    ? renderListTable(tasks)
    : '<div class="cards">' + tasks.map(renderCard).join("") + '</div>';
  return '<div class="section"><div class="section-header"><div class="section-dot" style="background:' + dotColor + '"></div><h2>' + title + '</h2><span class="section-count">' + tasks.length + '</span>' + addBtn + '</div>' + body + '</div>';
}

function renderAll() {
  var isManualGenre = selectedGenre === "teiki" || selectedGenre === "long_term";
  document.getElementById("displayToggle").style.display = isManualGenre ? "none" : "flex";
  document.getElementById("viewToggle").style.display = "flex";

  var tasksToShow = allTasks;
  if (selectedPersonId !== "all" && isManualGenre) {
    tasksToShow = allTasks.filter(function(t) {
      if (t.isManual && t.assigneeId) return String(t.assigneeId) === String(selectedPersonId);
      return true;
    });
  }
  if (GENRE_MAP[selectedGenre]) tasksToShow = tasksToShow.filter(function(t) { return normalizeCategory(t.category) === GENRE_MAP[selectedGenre]; });

  var ps = function(a, b) { var m = { high: 0, medium: 1, low: 2 }; return (m[a.priority] ?? 1) - (m[b.priority] ?? 1); };
  var html = "";

  if (selectedPersonId === "all" && !isManualGenre && selectedGenre === "all") {
    var people = peopleData.length > 0 ? peopleData : [{ name: "\u7B52\u4E95", id: 0 }, { name: "\u53CB\u5229", id: 0 }, { name: "\u77F3\u7530", id: 0 }, { name: "\u897F\u6751", id: 0 }];
    var chatworkTasks = allTasks.filter(function(t) { return !t.isManual; });
    html += '<div class="summary-row">';
    people.forEach(function(p) {
      var pTasks = chatworkTasks.filter(function(t) { return String(t.assigneeId) === String(p.id); });
      var openCount = pTasks.filter(function(t) { return t.localStatus === "open"; }).length;
      var ipCount = pTasks.filter(function(t) { return t.localStatus === "in_progress"; }).length;
      var waitCount = pTasks.filter(function(t) { return t.localStatus === "waiting"; }).length;
      var color = PERSON_COLORS[p.name] || "var(--accent)";
      html += '<div class="summary-card" onclick="setPerson(' + p.id + ')">';
      html += '<div class="summary-name">' + esc(p.name) + '</div>';
      html += '<div class="summary-count">' + pTasks.length + '<span>件</span></div>';
      html += '<div class="summary-detail">';
      if (openCount) html += '<span class="sd-item">未着手 ' + openCount + '</span>';
      if (ipCount) html += '<span class="sd-item">着手中 ' + ipCount + '</span>';
      if (waitCount) html += '<span class="sd-item">相手待ち ' + waitCount + '</span>';
      html += '</div>';
      html += '<div class="summary-bar" style="width:100%;background:' + color + ';"></div>';
      html += '</div>';
    });
    html += '</div>';
  }

  if (isManualGenre) {
    var addBtn = '<button class="add-task-btn" onclick="addManualTask(\'' + selectedGenre + '\')">＋ 追加</button>';
    var cardRenderer = selectedGenre === "teiki" ? renderTeikiCard : renderLongTermCard;

    var activeTasks = tasksToShow.filter(function(t) { return t.status !== "done"; });
    var doneTasks = tasksToShow.filter(function(t) { return t.status === "done"; });

    var activeBody = viewMode === "list"
      ? renderManualListTable(activeTasks, selectedGenre)
      : '<div class="cards">' + activeTasks.map(cardRenderer).join("") + '</div>';
    var doneBody = viewMode === "list"
      ? renderManualListTable(doneTasks, selectedGenre)
      : '<div class="cards">' + doneTasks.map(cardRenderer).join("") + '</div>';

    html = '<div class="section"><div class="section-header"><div class="section-dot" style="background:' + CATEGORY_COLORS[selectedGenre] + '"></div><h2>' + CATEGORY_LABELS[selectedGenre] + '</h2><span class="section-count">' + tasksToShow.length + '</span>' + addBtn + '</div>' + activeBody + '</div>';
    if (doneTasks.length) {
      html += '<div class="section"><div class="section-header"><div class="section-dot" style="background:var(--green)"></div><h2>完了</h2><span class="section-count">' + doneTasks.length + '</span></div>' + doneBody + '</div>';
    }
  } else {
    var active = tasksToShow.filter(function(t) { return t.localStatus !== "done"; });
    var done = tasksToShow.filter(function(t) { return t.localStatus === "done"; });
    if (displayMode === "priority") {
      var hi = active.filter(function(t) { return t.priority === "high"; });
      var md = active.filter(function(t) { return t.priority === "medium" || !t.priority; });
      var lo = active.filter(function(t) { return t.priority === "low"; });
      html = [renderSection("高", hi, "var(--red)"), renderSection("中", md, "var(--yellow)"), renderSection("低", lo, "var(--text2)"), done.length ? renderSection("完了", done, "var(--green)") : ""].join("");
    } else {
      var o = tasksToShow.filter(function(t) { return t.localStatus === "open"; }); o.sort(ps);
      var ip = tasksToShow.filter(function(t) { return t.localStatus === "in_progress"; }); ip.sort(ps);
      var w = tasksToShow.filter(function(t) { return t.localStatus === "waiting"; }); w.sort(ps);
      html = [renderSection("未着手", o, "var(--text2)"), renderSection("着手中", ip, "var(--accent)"), renderSection("相手待ち", w, "var(--yellow)"), done.length ? renderSection("完了", done, "var(--green)") : ""].join("");
    }
  }

  if (!html.trim()) {
    html = apiError ? '<div class="empty-state">Chatworkからタスクを取得できませんでした。</div>'
      : isManualGenre ? '<div class="empty-state"><button class="add-task-btn" style="font-size:14px;padding:10px 24px;" onclick="addManualTask(\'' + selectedGenre + '\')">＋ ' + CATEGORY_LABELS[selectedGenre] + 'を追加</button></div>'
      : allTasks.length === 0 ? '<div class="empty-state" style="font-size:18px;">タスクがありません。おめでとうございます\uD83C\uDF89\u2728</div>'
      : '<div class="empty-state">「' + esc(CATEGORY_LABELS[selectedGenre]||selectedGenre) + '」に該当するタスクはありません。</div>';
  }
  document.getElementById("app").innerHTML = html;
}

var PERSON_COLORS = { "\u7B52\u4E95": "#b8e986", "\u53CB\u5229": "#ffb3d9", "\u77F3\u7530": "#87ceeb", "\u897F\u6751": "#f0c674" };
function renderPersonButtons() {
  var row = document.getElementById("personRow");
  var people = peopleData.length > 0 ? peopleData : [{ name: "\u7B52\u4E95", id: 0 }, { name: "\u53CB\u5229", id: 0 }, { name: "\u77F3\u7530", id: 0 }, { name: "\u897F\u6751", id: 0 }];
  var activeId = selectedPersonId != null ? selectedPersonId : (myId != null ? myId : (people[0] ? people[0].id : null));
  var html = '<select class="person-select" onchange="setPerson(this.value===\'all\'?\'all\':Number(this.value))">';
  html += '<option value="all"' + (activeId === "all" ? ' selected' : '') + '>全員</option>';
  html += people.map(function(p) {
    return '<option value="' + p.id + '"' + (activeId !== "all" && p.id === activeId ? ' selected' : '') + '>' + esc(p.name) + '</option>';
  }).join("");
  html += '</select>';
  row.innerHTML = html;
}

async function loadAll() {
  var btn = document.getElementById("reloadBtn");
  btn.disabled = true; btn.innerHTML = '<span class="reload-icon">&#x23F3;</span> 更新中';
  apiError = null;
  document.getElementById("apiErrorBanner").style.display = "none";
  try {
    var params = [];
    if (selectedPersonId != null && selectedPersonId !== "all") params.push("accountId=" + selectedPersonId);
    params.push("_t=" + Date.now());

    var tasksPromise = apiCall("GET", "/api/dashboard/tasks?" + params.join("&"));
    var peoplePromise = apiCall("GET", "/api/people").catch(function() { return { people: [], myId: null }; });
    var results = await Promise.all([tasksPromise, peoplePromise]);
    var tasksJson = results[0];
    var peopleJson = results[1];

    if (Array.isArray(tasksJson)) allTasks = tasksJson;
    else { apiError = tasksJson.error || "取得失敗"; allTasks = []; }

    peopleData = Array.isArray(peopleJson.people) ? peopleJson.people : [];
    myId = peopleJson.myId != null ? peopleJson.myId : null;
    if (selectedPersonId == null && peopleData.length > 0) selectedPersonId = myId != null ? myId : (peopleData[0] ? peopleData[0].id : null);
    renderPersonButtons(); renderAll(); tasksLoaded = true;
    document.getElementById("lastUpdated").textContent = "最終更新: " + new Date().toLocaleTimeString("ja-JP");
    var sel = peopleData.find(function(p) { return p.id === selectedPersonId; });
    if (apiError) { document.getElementById("apiErrorBanner").textContent = "Chatwork: " + apiError; document.getElementById("apiErrorBanner").style.display = "block"; }
  } catch (err) {
    document.getElementById("app").innerHTML = '<div class="empty-state" style="color:var(--red);">読み込みエラー: ' + esc(err.message) + '</div>';
  } finally { btn.disabled = false; btn.innerHTML = '<span class="reload-icon">&#x21bb;</span> 更新'; }
}

// ============================
// Utilities
// ============================
function show(id) { document.getElementById(id).classList.remove("hidden"); }
function hide(id) { document.getElementById(id).classList.add("hidden"); }

// ============================
// Init
// ============================
document.addEventListener("DOMContentLoaded", function() {
  initGoogleSignIn();
  renderCategories();
});
