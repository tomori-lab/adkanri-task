<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOアド管理</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="apple-mobile-web-app-title" content="TOアド管理">
  <style>
    /* ダークテーマ・コンパクト */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: 'Google Sans', Roboto, -apple-system, sans-serif; }
    body {
      background: #0f172a;
      color: #f1f5f9;
    }
    .app-header {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .app-header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #f1f5f9;
    }
    .app-header .requester {
      font-size: 12px;
      color: #94a3b8;
    }
    .app-header .requester.error {
      color: #f87171;
    }
    .app-layout {
      display: flex;
      height: calc(100vh - 40px);
    }
    .sidebar {
      width: 120px;
      background: #1e293b;
      border-right: 1px solid #334155;
      padding: 8px 0;
      flex-shrink: 0;
    }
    .tabs {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .tab {
      padding: 8px 16px;
      border: none;
      border-left: 3px solid transparent;
      border-radius: 0;
      background: transparent;
      color: #94a3b8;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      text-align: left;
      transition: all .2s;
    }
    .tab:hover {
      color: #f1f5f9;
      background: rgba(255,255,255,.05);
    }
    .tab.active {
      color: #60a5fa;
      border-left-color: #60a5fa;
      background: rgba(96,165,250,.15);
    }
    .content {
      flex: 1;
      position: relative;
      min-width: 0;
    }
    .panel {
      display: none;
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0; left: 0;
    }
    .panel.active {
      display: block;
    }
    .panel iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .task-panel-controls {
      background: #1e293b;
      padding: 8px 16px;
      border-bottom: 1px solid #334155;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .task-panel-controls .requestor-input {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .task-panel-controls label {
      font-size: 12px;
      color: #94a3b8;
    }
    .task-panel-controls input {
      padding: 5px 10px;
      border-radius: 4px;
      border: 1px solid #475569;
      background: #334155;
      color: #f1f5f9;
      font-size: 12px;
      min-width: 180px;
    }
    .task-panel-controls input::placeholder {
      color: #64748b;
    }
    .task-panel-controls button {
      padding: 5px 12px;
      border-radius: 4px;
      border: none;
      background: #3b82f6;
      color: white;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
    }
    .task-panel-controls button:hover {
      background: #2563eb;
    }
    .task-panel-controls .view-toggle {
      display: flex;
      gap: 4px;
    }
    .task-panel-controls .view-toggle button {
      background: #334155;
      color: #94a3b8;
      font-weight: 500;
      font-size: 12px;
    }
    .task-panel-controls .view-toggle button.active {
      background: rgba(59,130,246,.3);
      color: #60a5fa;
    }
    .task-frame-wrap {
      height: calc(100% - 48px);
    }
    .task-frame-wrap iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
    }
    .task-unavailable {
      padding: 24px 20px;
      text-align: center;
      color: #94a3b8;
      background: #1e293b;
      margin: 16px;
      border-radius: 6px;
      border: 1px dashed #475569;
    }
    .task-unavailable h3 {
      color: #f1f5f9;
      margin-bottom: 6px;
      font-size: 14px;
    }
    .task-unavailable code {
      background: #334155;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 11px;
    }
  </style>
</head>
<body>

<header class="app-header">
  <h1>TOアド管理ツール</h1>
  <span id="headerRequester" class="requester"></span>
</header>

<div class="app-layout">
  <aside class="sidebar">
    <nav class="tabs">
      <button class="tab active" data-tab="request">依頼する</button>
      <button class="tab" data-tab="tasks">タスク一覧</button>
    </nav>
  </aside>
  <main class="content">
  <section class="panel active" id="panel-request">
    <iframe
      src="https://script.google.com/a/macros/shibuya-ad.com/s/AKfycbwuuoXgV1rlzxw9gM4GPdK9bamJmVcktnXv9iDoRcdPUbKwRoJoojMqtIjpvxDqY-o/exec?v=2"
      title="TOアド管理依頼"
    ></iframe>
  </section>

  <section class="panel" id="panel-tasks">
    <div class="task-panel-controls">
      <div class="view-toggle">
        <button type="button" class="view-btn active" data-view="all">全タスク（アド管理）</button>
        <button type="button" class="view-btn" data-view="requestor">自分の依頼</button>
      </div>
      <div class="requestor-input" style="display:none;">
        <label for="email">メールアドレス:</label>
        <input type="email" id="email" placeholder="xxx@axis-ads.co.jp">
        <button type="button" id="applyEmail">表示</button>
      </div>
    </div>
    <div class="task-frame-wrap">
      <!-- デプロイ後、DASHBOARD_URL を Render のURLに差し替えてください -->
      <iframe id="taskFrame" src="" title="タスク一覧"></iframe>
      <div id="taskUnavailable" class="task-unavailable" style="display:none;">
        <h3>タスク一覧を読み込めません</h3>
        <p>task-dashboard を Render にデプロイし、<code>docs/config.js</code> の DASHBOARD_URL を設定してください。</p>
        <p><a href="デプロイ手順.md" target="_blank" style="color:#60a5fa;">デプロイ手順</a>を参照してください。</p>
      </div>
    </div>
  </section>
  </main>
</div>

<script src="config.js"></script>
<script>
(function() {
  const DASHBOARD_URL = typeof window.DASHBOARD_URL !== 'undefined' ? window.DASHBOARD_URL : '';

  // GAS iframe から依頼者情報を受信してヘッダーに表示
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'ADKANRI_REQUESTER') {
      const el = document.getElementById('headerRequester');
      if (el) {
        el.textContent = e.data.text || '';
        el.className = 'requester' + (e.data.error ? ' error' : '');
      }
    }
  });

  const tabs = document.querySelectorAll('.tab');
  const panels = document.querySelectorAll('.panel');
  const viewBtns = document.querySelectorAll('.view-btn');
  const requestorInput = document.querySelector('.requestor-input');
  const emailInput = document.getElementById('email');
  const applyBtn = document.getElementById('applyEmail');
  const taskFrame = document.getElementById('taskFrame');
  const taskUnavailable = document.getElementById('taskUnavailable');

  function showPanel(name) {
    panels.forEach(p => {
      p.classList.toggle('active', p.id === 'panel-' + name);
    });
    tabs.forEach(t => {
      t.classList.toggle('active', t.dataset.tab === name);
    });
    if (name === 'tasks' && DASHBOARD_URL) {
      updateTaskFrameUrl();
    }
  }

  function getTaskFrameUrl() {
    const view = document.querySelector('.view-btn.active')?.dataset.view || 'all';
    const email = emailInput?.value?.trim() || '';
    if (view === 'all') return DASHBOARD_URL + '/';
    if (view === 'requestor' && email) {
      return DASHBOARD_URL + '/?view=requestor&email=' + encodeURIComponent(email);
    }
    return DASHBOARD_URL + '/?view=requestor';
  }

  function updateTaskFrameUrl() {
    if (!DASHBOARD_URL) {
      taskFrame.style.display = 'none';
      taskUnavailable.style.display = 'block';
      return;
    }
    taskFrame.src = getTaskFrameUrl();
    taskFrame.style.display = 'block';
    taskUnavailable.style.display = 'none';
  }

  tabs.forEach(t => {
    t.addEventListener('click', () => showPanel(t.dataset.tab));
  });

  viewBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      viewBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      requestorInput.style.display = btn.dataset.view === 'requestor' ? 'flex' : 'none';
      if (DASHBOARD_URL) updateTaskFrameUrl();
    });
  });

  applyBtn?.addEventListener('click', () => {
    if (DASHBOARD_URL) updateTaskFrameUrl();
  });

  emailInput?.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') applyBtn?.click();
  });

  if (DASHBOARD_URL) {
    taskFrame.src = getTaskFrameUrl();
  } else {
    taskFrame.style.display = 'none';
    taskUnavailable.style.display = 'block';
  }
})();
</script>
</body>
</html>
