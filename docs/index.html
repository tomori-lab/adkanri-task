<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アド管理タスク</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="apple-mobile-web-app-title" content="アド管理タスク">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root {
    --bg: #0f172a; --surface: #1e293b; --surface2: #334155; --border: #475569;
    --text: #f1f5f9; --text2: #94a3b8; --accent: #3b82f6;
    --red: #ef4444; --orange: #f97316; --yellow: #eab308; --green: #22c55e;
    --purple: #a855f7; --pink: #ec4899; --cyan: #06b6d4;
  }
  :root.light {
    --bg: #f1f5f9; --surface: #ffffff; --surface2: #e2e8f0; --border: #cbd5e1;
    --text: #0f172a; --text2: #475569; --accent: #2563eb;
    --red: #dc2626; --orange: #ea580c; --yellow: #ca8a04; --green: #16a34a;
    --purple: #9333ea; --pink: #db2777; --cyan: #0891b2;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', -apple-system, 'Hiragino Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 13px; }

  .auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
  .auth-overlay.hidden { display: none; }
  .auth-box { text-align: center; padding: 56px 48px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; max-width: 400px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,.3); }
  .auth-logo { font-size: 40px; margin-bottom: 16px; }
  .auth-box h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .auth-box .auth-subtitle { font-size: 13px; color: var(--text2); margin-bottom: 8px; }
  .auth-box .auth-domain { display: inline-block; font-size: 12px; color: var(--accent); background: rgba(59,130,246,.1); padding: 4px 12px; border-radius: 20px; margin-bottom: 24px; }
  .auth-divider { height: 1px; background: var(--border); margin: 0 -8px 24px; }
  .auth-signin-wrap { display: flex; justify-content: center; }

  .app-layout { display: flex; min-height: 100vh; }
  .sidebar { width: 240px; background: var(--surface); border-right: 1px solid var(--border); padding: 12px 0; flex-shrink: 0; position: sticky; top: 0; height: 100vh; overflow-y: auto; transition: width .2s, padding .2s; display: flex; flex-direction: column; }
  .sidebar.collapsed { width: 0; padding: 0; overflow: hidden; border-right: none; }
  .sidebar-header { display: flex; align-items: center; justify-content: space-between; padding: 4px 12px 12px 16px; }
  .sidebar-title { font-size: 16px; font-weight: 700; }
  .sidebar-header button { background: transparent; border: none; color: var(--text2); font-size: 18px; cursor: pointer; padding: 4px 8px; border-radius: 6px; }
  .sidebar-header button:hover { background: var(--surface2); color: var(--text); }
  .sidebar-user { padding: 0 16px 12px; font-size: 11px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .sidebar-nav { display: flex; flex-direction: column; gap: 2px; padding: 0 0 8px; border-bottom: 1px solid var(--border); }
  .nav-btn { display: block; width: 100%; padding: 10px 16px; border: none; border-left: 3px solid transparent; background: transparent; color: var(--text2); cursor: pointer; font-size: 13px; font-weight: 600; text-align: left; transition: all .2s; }
  .nav-btn:hover { color: var(--text); background: rgba(255,255,255,.05); }
  .nav-btn.active { color: var(--accent); border-left-color: var(--accent); background: rgba(59,130,246,.1); }
  .admin-only { display: none; }
  .is-admin .admin-only { display: block; }

  .person-row { display: flex; flex-wrap: nowrap; gap: 8px; padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .person-btn { flex: 1; min-width: 0; padding: 10px 8px; border-radius: 6px; border: 2px solid transparent; background: var(--surface2); color: var(--text2); font-size: 13px; font-weight: 600; cursor: pointer; transition: all .2s; text-align: center; }
  .person-btn:hover { color: var(--text); background: rgba(255,255,255,.12); }
  .person-btn.active { color: var(--text); border-color: var(--person-color, var(--accent)); }

  .genre-list { padding: 8px 0; display: flex; flex-direction: column; gap: 2px; flex: 1; }
  .genre-btn { display: block; width: 100%; padding: 8px 16px; border: none; border-left: 3px solid transparent; background: transparent; color: var(--text2); cursor: pointer; font-size: 12px; font-weight: 500; text-align: left; transition: all .2s; }
  .genre-btn:hover { color: var(--text); background: rgba(255,255,255,.05); }
  .genre-btn.active { color: var(--accent); border-left-color: var(--accent); background: rgba(59,130,246,.1); }

  .main-content { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 100; }
  .header-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
  .header-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .header-meta { font-size: 11px; color: var(--text2); white-space: nowrap; }
  .sidebar-toggle { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); font-size: 16px; cursor: pointer; display: none; align-items: center; justify-content: center; flex-shrink: 0; }
  .sidebar-toggle:hover { background: rgba(255,255,255,.1); color: var(--text); }
  .stats { display: flex; gap: 6px; align-items: center; }
  .header-icon-btn { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text2); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .2s; }
  .header-icon-btn:hover { background: var(--surface2); color: var(--text); }
  .header-icon-btn:disabled { opacity: .4; cursor: wait; }
  .user-avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--accent); color: white; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: default; }

  .panel { display: none; flex: 1; overflow-y: auto; }
  .panel.active { display: block; }
  main { max-width: 1200px; width: 100%; margin: 0 auto; padding: 24px; }
  .section { margin-bottom: 32px; }
  .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .section-header h2 { font-size: 16px; font-weight: 700; }
  .section-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .section-count { background: var(--surface2); padding: 2px 10px; border-radius: 10px; font-size: 12px; color: var(--text2); }
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 12px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; cursor: pointer; position: relative; transition: border-color .2s; }
  .card:hover { border-color: var(--accent); }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .card-title { font-size: 15px; font-weight: 600; line-height: 1.4; flex: 1; margin-right: 8px; }
  .card-title-row { display: flex; align-items: flex-start; gap: 6px; flex: 1; min-width: 0; }
  .card-priority { font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: 700; flex-shrink: 0; }
  .card-priority.high { background: rgba(239,68,68,.2); color: var(--red); }
  .card-priority.medium { background: rgba(234,179,8,.2); color: var(--yellow); }
  .card-priority.low { background: rgba(148,163,184,.2); color: var(--text2); }
  .card-meta { display: flex; gap: 12px; font-size: 12px; color: var(--text2); margin-bottom: 10px; flex-wrap: wrap; }
  .card-body { font-size: 12px; color: var(--text2); line-height: 1.5; max-height: 60px; overflow: hidden; margin-bottom: 10px; }
  .card-actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .card-actions select, .card-actions input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 4px 8px; border-radius: 6px; font-size: 12px; }
  .card-actions input { flex: 1; min-width: 120px; }
  .edit-title-btn { background: transparent; border: none; color: var(--text2); font-size: 13px; cursor: pointer; padding: 2px 4px; border-radius: 4px; flex-shrink: 0; opacity: 0; transition: opacity .2s; }
  .card:hover .edit-title-btn { opacity: 1; }
  .edit-title-btn:hover { color: var(--accent); }
  .overdue { border-left: 3px solid var(--red); }
  .due-today { border-left: 3px solid var(--orange); }
  .due-soon { border-left: 3px solid var(--yellow); }
  .display-toggle { display: flex; gap: 4px; margin-bottom: 16px; }
  .display-toggle button { padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); font-size: 12px; cursor: pointer; }
  .display-toggle button.active { background: rgba(59,130,246,.2); color: var(--accent); border-color: var(--accent); }
  .empty-state { padding: 40px 24px; text-align: center; color: var(--text2); font-size: 14px; line-height: 1.8; }
  .api-error-banner { background: rgba(239,68,68,.15); border: 1px solid rgba(239,68,68,.3); color: var(--red); padding: 10px 16px; font-size: 13px; margin: 0 24px 16px; border-radius: 8px; }
  .add-task-btn { display: inline-flex; align-items: center; gap: 4px; padding: 4px 12px; border-radius: 8px; border: 1px dashed var(--border); background: transparent; color: var(--text2); font-size: 12px; cursor: pointer; transition: all .2s; }
  .add-task-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(59,130,246,.08); }
  .modal-form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .modal-form-group label { font-size: 13px; font-weight: 600; color: var(--text); }
  .modal-form-group input, .modal-form-group select { padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface2); color: var(--text); font-size: 14px; }
  .modal-form-group input:focus, .modal-form-group select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,.12); }
  .modal-submit-btn { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .2s; }
  .modal-submit-btn:hover { opacity: .85; }
  .delete-task-btn { background: transparent; border: none; color: var(--text2); font-size: 14px; cursor: pointer; padding: 2px 4px; border-radius: 4px; flex-shrink: 0; opacity: 0; transition: opacity .2s; }
  .card:hover .delete-task-btn { opacity: 1; }
  .delete-task-btn:hover { color: var(--red); }

  .teiki-check { background: none; border: 2px solid var(--border); width: 24px; height: 24px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; transition: all .2s; }
  .teiki-check:hover { border-color: var(--green); }
  .teiki-check.done { background: var(--green); border-color: var(--green); color: white; }
  .freq-badge { font-size: 11px; padding: 2px 10px; border-radius: 10px; background: rgba(6,182,212,.15); color: var(--cyan); font-weight: 600; flex-shrink: 0; }
  .next-due { font-size: 11px; color: var(--text2); margin-top: 4px; }
  .card.teiki-done .card-title { text-decoration: line-through; color: var(--text2); }

  .todo-progress { margin-top: 8px; }
  .todo-progress-text { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
  .progress-bar { height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width .3s; }
  .todo-list { display: flex; flex-direction: column; gap: 6px; margin: 12px 0; }
  .todo-item { display: flex; align-items: center; gap: 8px; padding: 10px 12px; background: var(--surface2); border-radius: 8px; font-size: 13px; }
  .todo-item.todo-done { opacity: .55; }
  .todo-item.todo-done .todo-text { text-decoration: line-through; }
  .todo-text { flex: 1; font-weight: 500; }
  .todo-status-select { padding: 3px 6px; border: 1px solid var(--border); border-radius: 5px; background: var(--surface); color: var(--text); font-size: 11px; flex-shrink: 0; }
  .todo-date-input { padding: 3px 6px; border: 1px solid var(--border); border-radius: 5px; background: var(--surface); color: var(--text); font-size: 11px; flex-shrink: 0; width: 120px; }
  .todo-delete-btn { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 14px; padding: 2px 4px; opacity: 0; transition: opacity .2s; flex-shrink: 0; }
  .todo-item:hover .todo-delete-btn { opacity: 1; }
  .todo-delete-btn:hover { color: var(--red); }
  .todo-add { display: flex; gap: 6px; margin-top: 10px; }
  .todo-add input { flex: 1; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface2); color: var(--text); font-size: 13px; }
  .todo-add input:focus { outline: none; border-color: var(--accent); }
  .todo-add button { padding: 8px 14px; background: var(--accent); color: white; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; white-space: nowrap; }
  .modal-save-btn { width: 100%; padding: 12px; background: var(--green); color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 16px; transition: opacity .2s; }
  .modal-save-btn:hover { opacity: .85; }
  .status-select-inline { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 4px 8px; border-radius: 6px; font-size: 12px; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 500; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .modal-overlay.hidden { display: none; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; width: 100%; max-width: 640px; max-height: 80vh; display: flex; flex-direction: column; overflow: hidden; }
  .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .modal-header h2 { font-size: 17px; font-weight: 700; flex: 1; margin-right: 12px; line-height: 1.4; }
  .modal-close { background: transparent; border: none; color: var(--text2); font-size: 20px; cursor: pointer; padding: 4px 8px; border-radius: 6px; flex-shrink: 0; }
  .modal-close:hover { background: var(--surface2); color: var(--text); }
  .modal-body { padding: 20px; overflow-y: auto; flex: 1; }
  .modal-meta { display: flex; gap: 12px; flex-wrap: wrap; font-size: 13px; color: var(--text2); margin-bottom: 16px; }
  .modal-full-body { font-size: 14px; color: var(--text); line-height: 1.7; white-space: pre-wrap; word-break: break-word; background: var(--bg); border-radius: 8px; padding: 16px; }
  .modal-actions { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; flex-wrap: wrap; }
  .modal-actions select, .modal-actions input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 6px; font-size: 13px; }
  .modal-actions input { flex: 1; min-width: 140px; }

  .req-container { max-width: 640px; margin: 0 auto; padding: 24px 16px 60px; }
  .req-step { margin-bottom: 16px; }
  .req-step-label { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 8px; }
  .req-step-num { background: var(--accent); color: white; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; flex-shrink: 0; }
  .req-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
  .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .cat-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; font-size: 12px; font-weight: 500; color: var(--text2); cursor: pointer; text-align: left; line-height: 1.35; transition: all .2s; }
  .cat-btn:hover { border-color: var(--accent); background: rgba(59,130,246,.1); color: var(--text); }
  .cat-btn.active { border-color: var(--accent); background: rgba(59,130,246,.1); color: var(--accent); font-weight: 600; }
  .cat-btn .cat-icon { font-size: 16px; display: block; margin-bottom: 2px; }
  .sub-list { display: flex; flex-direction: column; gap: 4px; }
  .sub-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; font-size: 12px; color: var(--text2); cursor: pointer; text-align: left; transition: all .2s; }
  .sub-btn:hover { border-color: var(--accent); color: var(--text); }
  .sub-btn.active { border-color: var(--accent); color: var(--accent); font-weight: 600; }
  .req-field { margin-bottom: 12px; }
  .req-field:last-child { margin-bottom: 0; }
  .req-field label { display: block; font-size: 11px; font-weight: 500; color: var(--text2); margin-bottom: 4px; }
  .req-field label .required { color: var(--red); margin-left: 2px; }
  .req-field select, .req-field input, .req-field textarea { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; font-family: inherit; color: var(--text); background: var(--surface2); }
  .req-field textarea { resize: vertical; min-height: 72px; }
  .req-field select:focus, .req-field input:focus, .req-field textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(59,130,246,.2); }
  .submit-btn { width: 100%; padding: 10px; background: var(--accent); color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 16px; }
  .submit-btn:hover { opacity: .9; }
  .submit-btn:disabled { background: var(--text2); cursor: not-allowed; }
  .success-screen { text-align: center; padding: 48px 20px; }
  .success-icon { width: 48px; height: 48px; background: rgba(34,197,94,.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; font-size: 24px; color: var(--green); }
  .success-screen h2 { font-size: 16px; margin-bottom: 6px; }
  .success-screen p { color: var(--text2); font-size: 12px; }
  .new-btn { display: inline-block; margin-top: 20px; padding: 8px 20px; background: var(--accent); color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; }
  .field-error input, .field-error select, .field-error textarea { border-color: var(--red) !important; }
  .error-msg { color: var(--red); font-size: 11px; margin-top: 4px; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3); border-top-color: white; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .hidden { display: none !important; }

  .admin-container { max-width: 640px; margin: 0 auto; padding: 24px 16px; }
  .admin-section { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 16px; }
  .admin-section h3 { font-size: 15px; font-weight: 700; margin-bottom: 12px; }
  .admin-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
  .admin-item { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--surface2); border-radius: 6px; font-size: 13px; }
  .admin-item span { flex: 1; }
  .admin-item button { background: transparent; border: 1px solid var(--border); color: var(--text2); padding: 4px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; }
  .admin-item button:hover { background: rgba(239,68,68,.2); color: var(--red); border-color: var(--red); }
  .admin-add { display: flex; gap: 8px; }
  .admin-add input { flex: 1; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface2); color: var(--text); font-size: 13px; }
  .admin-add button { padding: 8px 16px; background: var(--accent); color: white; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; white-space: nowrap; }

  .req-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .req-table th, .req-table td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
  .req-table th { color: var(--text2); font-weight: 500; background: var(--surface); position: sticky; top: 0; }
  .req-table tr:hover { background: rgba(255,255,255,.03); }
  .req-status { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .req-status.pending { background: rgba(234,179,8,.15); color: var(--yellow); }
  .req-status.progress { background: rgba(59,130,246,.15); color: var(--accent); }
  .req-status.done { background: rgba(34,197,94,.15); color: var(--green); }
</style>
</head>
<body>

<div class="auth-overlay" id="authOverlay">
  <div class="auth-box">
    <div class="auth-logo">⚡</div>
    <h2>アド管理タスク</h2>
    <p class="auth-subtitle">shibuya-ad.com のGoogleアカウントでログインしてください</p>
    <div class="auth-divider"></div>
    <div class="auth-signin-wrap" id="googleSignInLarge"></div>
  </div>
</div>

<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1 class="sidebar-title">アド管理タスク</h1>
      <button onclick="toggleSidebar()" title="閉じる">&#10005;</button>
    </div>
    <div class="sidebar-user" id="sidebarUser"></div>

    <div class="sidebar-nav" id="sidebarNav">
      <button class="nav-btn active" data-page="request" onclick="switchPage('request')">✏️ 依頼する</button>
      <button class="nav-btn" data-page="mystatus" onclick="switchPage('mystatus')">📅 依頼状況</button>
      <button class="nav-btn admin-only" data-page="tasks" onclick="switchPage('tasks')">🌟 タスク管理</button>

<script>
// ============================
// Config
// ============================
var API_BASE = (typeof API_URL !== 'undefined' && API_URL) ? API_URL : '';

// ============================
// Theme
// ============================
function toggleTheme() {
  var isLight = document.documentElement.classList.toggle("light");
  document.getElementById("themeToggle").textContent = isLight ? "\u2600\uFE0F" : "\uD83C\uDF19";
  localStorage.setItem("theme", isLight ? "light" : "dark");
}
(function() {
  if (localStorage.getItem("theme") === "light") {
    document.documentElement.classList.add("light");
    document.addEventListener("DOMContentLoaded", function() {
      document.getElementById("themeToggle").textContent = "\u2600\uFE0F";
    });
  }
})();

function toggleSidebar() {
  var sb = document.getElementById("sidebar");
  var btn = document.getElementById("sidebarOpen");
  sb.classList.toggle("collapsed");
  btn.style.display = sb.classList.contains("collapsed") ? "inline-flex" : "none";
}

// ============================
// Auth
// ============================
var authToken = null;
var currentUser = null;
var userRole = "user";

function decodeJwt(token) {
  var payload = token.split(".")[1];
  return JSON.parse(atob(payload.replace(/-/g, "+").replace(/_/g, "/")));
}

function isTokenExpired() {
  if (!authToken) return true;
  try { return Date.now() / 1000 > decodeJwt(authToken).exp - 60; } catch(e) { return true; }
}

function reAuthenticate() {
  document.getElementById("authOverlay").classList.remove("hidden");
  if (typeof google !== "undefined" && google.accounts) google.accounts.id.prompt();
}

function apiCall(method, path, body) {
  if (isTokenExpired()) { reAuthenticate(); return Promise.reject(new Error("ログインが必要です")); }
  var opts = { method: method, headers: { "Authorization": "Bearer " + authToken, "Content-Type": "application/json" } };
  if (body && method !== "GET" && method !== "DELETE") opts.body = JSON.stringify(body);
  return fetch(API_BASE + path, opts).then(function(res) {
    return res.json().then(function(data) {
      if (res.status === 401) { reAuthenticate(); throw new Error(data.error || "ログインが必要です"); }
      if (!res.ok) throw new Error(data.error || "エラーが発生しました");
      return data;
    });
  });
}

function handleCredentialResponse(response) {
  authToken = response.credential;
  var payload = decodeJwt(authToken);
  currentUser = { email: payload.email, name: payload.name || payload.email, picture: payload.picture || null };
  document.getElementById("sidebarUser").textContent = currentUser.email;
  var avatar = document.getElementById("userAvatar");
  if (currentUser.picture) {
    avatar.innerHTML = '<img src="' + currentUser.picture + '" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">';
  } else {
    avatar.textContent = (currentUser.name || "?").charAt(0).toUpperCase();
  }
  avatar.title = currentUser.name;
  document.getElementById("authOverlay").classList.add("hidden");
  checkRole();
}

async function checkRole() {
  try {
    var data = await apiCall("POST", "/api/role", {});
    userRole = data.role;
    applyRole();
    if (data.firstSetup) switchPage("admin");
  } catch (e) {
    userRole = "user";
    applyRole();
  }
}

function applyRole() {
  var layout = document.querySelector(".app-layout");
  if (userRole === "admin") { layout.classList.add("is-admin"); } else { layout.classList.remove("is-admin"); }
}

function initGoogleSignIn() {
  if (!GOOGLE_CLIENT_ID) return;
  function tryInit() {
    if (typeof google === "undefined" || !google.accounts) { setTimeout(tryInit, 200); return; }
    google.accounts.id.initialize({
      client_id: GOOGLE_CLIENT_ID,
      callback: handleCredentialResponse,
      auto_select: true,
    });
    google.accounts.id.renderButton(document.getElementById("googleSignInLarge"), { theme: "filled_blue", size: "large", shape: "pill", text: "signin_with", locale: "ja" });
    google.accounts.id.prompt();
  }
  tryInit();
}

// ============================
// Page switching
// ============================
var currentPage = "request";

function switchPage(page) {
  currentPage = page;
  document.querySelectorAll(".nav-btn").forEach(function(b) { b.classList.toggle("active", b.dataset.page === page); });
  document.querySelectorAll(".panel").forEach(function(p) { p.classList.remove("active"); });
  document.getElementById("panel-" + page).classList.add("active");

  var taskFilters = document.getElementById("taskFilters");
  var headerStats = document.getElementById("headerStats");

  if (page === "tasks") {
    taskFilters.style.display = "block";
    headerStats.style.display = "flex";
    if (!tasksLoaded) loadAll();
  } else {
    taskFilters.style.display = "none";
    headerStats.style.display = "none";
  }

  if (page === "mystatus") loadMyRequests();
  if (page === "admin") loadAdminRoles();

}

var reqState = { categoryId: "", categoryLabel: "", subCategoryId: "", subCategoryLabel: "" };

function renderCategories() {
  var grid = document.getElementById("categoryGrid");
  grid.innerHTML = CATEGORIES.map(function(c) { return '<button class="cat-btn" data-id="' + c.id + '" onclick="selectCategory(\'' + c.id + '\')"><span class="cat-icon">' + c.icon + '</span>' + esc(c.label) + '</button>'; }).join("");
}

function selectCategory(id) {
  var cat = CATEGORIES.find(function(c) { return c.id === id; });
  reqState.categoryId = cat.id;
  reqState.categoryLabel = cat.label;
  reqState.subCategoryId = "";
  reqState.subCategoryLabel = "";
  document.querySelectorAll(".cat-btn").forEach(function(b) { b.classList.toggle("active", b.dataset.id === id); });
  var subs = SUB_CATEGORIES[id];
  var stepNum = document.querySelector("#reqStep3 .req-step-num");
  if (subs && subs.length > 1) {
    renderSubCategories(subs);
    show("reqStep2"); hide("reqStep3"); hide("submitArea");
    if (stepNum) stepNum.textContent = "3";
  } else if (subs && subs.length === 1) {
    hide("reqStep2");
    if (stepNum) stepNum.textContent = "3";
    selectSubCategory(subs[0].id);
  } else {
    hide("reqStep2");
    if (stepNum) stepNum.textContent = "2";
    if (FIELDS[id]) {
      reqState.subCategoryId = id;
      reqState.subCategoryLabel = "";
      renderFormFields(FIELDS[id]);
      show("reqStep3"); show("submitArea");
    } else { hide("reqStep3"); hide("submitArea"); }
  }
}

function renderSubCategories(subs) {
  document.getElementById("subCategoryList").innerHTML = subs.map(function(s) { return '<button class="sub-btn" data-id="' + s.id + '" onclick="selectSubCategory(\'' + s.id + '\')">' + esc(s.label) + '</button>'; }).join("");
}

function selectSubCategory(id) {
  var sub = Object.values(SUB_CATEGORIES).flat().find(function(s) { return s.id === id; });
  if (!sub) return;
  reqState.subCategoryId = sub.id;
  reqState.subCategoryLabel = sub.label;
  document.querySelectorAll(".sub-btn").forEach(function(b) { b.classList.toggle("active", b.dataset.id === id); });
  if (FIELDS[id]) { renderFormFields(FIELDS[id]); show("reqStep3"); show("submitArea"); }
}

function renderFormFields(fields) {
  var container = document.getElementById("detailFields");
  container.innerHTML = "";
  fields.forEach(function(f) {
    var div = document.createElement("div");
    div.className = "req-field";
    div.id = "field-" + f.id;
    var inputHtml;
    if (f.type === "select") {
      inputHtml = '<select id="input-' + f.id + '" data-label="' + f.label + '" data-required="' + f.required + '"><option value="">選択してください</option>' + f.options.map(function(o) { return '<option value="' + o + '">' + o + '</option>'; }).join("") + '</select>';
    } else if (f.type === "textarea") {
      inputHtml = '<textarea id="input-' + f.id + '" data-label="' + f.label + '" data-required="' + f.required + '" placeholder="' + f.label + 'を入力"></textarea>';
    } else {
      inputHtml = '<input type="' + (f.type || "text") + '" id="input-' + f.id + '" data-label="' + f.label + '" data-required="' + f.required + '" placeholder="' + f.label + 'を入力">';
    }
    div.innerHTML = '<label for="input-' + f.id + '">' + f.label + (f.required ? '<span class="required">*</span>' : "") + '</label>' + inputHtml;
    container.appendChild(div);
  });
}

function handleRequestSubmit() {
  if (!currentUser) { reAuthenticate(); return; }
  var valid = true;
  document.querySelectorAll(".error-msg").forEach(function(e) { e.remove(); });
  document.querySelectorAll(".field-error").forEach(function(e) { e.classList.remove("field-error"); });
  document.querySelectorAll("#detailFields input, #detailFields select, #detailFields textarea").forEach(function(inp) {
    if (inp.dataset.required === "true" && !inp.value.trim()) {
      valid = false;
      var field = inp.closest(".req-field");
      field.classList.add("field-error");
      var err = document.createElement("div");
      err.className = "error-msg";
      err.textContent = inp.dataset.label + "は必須です";
      field.appendChild(err);
    }
  });
  if (!valid) return;

  var btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>送信中...';

  var fields = [];
  document.querySelectorAll("#detailFields input, #detailFields select, #detailFields textarea").forEach(function(inp) {
    fields.push({ label: inp.dataset.label, value: inp.value });
  });

  apiCall("POST", "/api/submit", { name: currentUser.email, category: reqState.categoryLabel, subCategory: reqState.subCategoryLabel, fields: fields })
    .then(function(result) {
      if (result.success) { hide("reqFormScreen"); show("reqSuccessScreen"); }
      else { alert("送信に失敗しました: " + (result.error || "")); btn.disabled = false; btn.textContent = "送信する"; }
    }).catch(function(err) { alert("エラー: " + err.message); btn.disabled = false; btn.textContent = "送信する"; });
}

function resetRequestForm() {
  reqState = { categoryId: "", categoryLabel: "", subCategoryId: "", subCategoryLabel: "" };
  document.querySelectorAll(".cat-btn").forEach(function(b) { b.classList.remove("active"); });
  hide("reqStep2"); hide("reqStep3"); hide("submitArea");
  document.getElementById("detailFields").innerHTML = "";
  document.getElementById("submitBtn").disabled = false;
  document.getElementById("submitBtn").textContent = "送信する";
  hide("reqSuccessScreen"); show("reqFormScreen");
}

// ============================
// My Requests
// ============================
async function loadMyRequests() {
  var area = document.getElementById("myRequestsArea");
  area.innerHTML = '<div class="empty-state">読み込み中...</div>';
  try {
    var tasks = await apiCall("GET", "/api/tasks");
    if (!Array.isArray(tasks) || tasks.length === 0) {
      area.innerHTML = '<div class="empty-state">依頼はまだありません</div>';
      return;
    }
    function statusClass(s) { return s === "完了" ? "done" : s === "対応中" ? "progress" : "pending"; }
    var html = '<table class="req-table"><thead><tr><th>内容</th><th>日時</th><th>進捗</th></tr></thead><tbody>';
    tasks.forEach(function(t) {
      html += '<tr><td>' + esc(t.category) + (t.subCategory ? " / " + esc(t.subCategory) : "") + '</td>';
      html += '<td>' + esc(t.createdAt || "") + '</td>';
      html += '<td><span class="req-status ' + statusClass(t.status) + '">' + esc(t.status || "未対応") + '</span></td></tr>';
    });
    html += "</tbody></table>";
    area.innerHTML = html;
  } catch (err) {
    area.innerHTML = '<div class="empty-state">読み込みに失敗しました: ' + esc(err.message) + "</div>";
  }
}

async function loadAdminRoles() {
  try {
    var data = await apiCall("GET", "/api/admin/roles");
    var list = document.getElementById("adminList");
    if (!data.admins || data.admins.length === 0) {
      list.innerHTML = '<div style="color:var(--text2);font-size:12px;">管理者がいません</div>';
      return;
    }

  } catch (e) {}
}

async function addAdmin() {
  var input = document.getElementById("adminEmailInput");
  var email = input.value.trim().toLowerCase();
  if (!email) return;
  try {
    var data = await apiCall("GET", "/api/admin/roles");
    var admins = data.admins || [];
    if (!admins.includes(email)) admins.push(email);

    loadAdminRoles();

async function removeAdmin(email) {
  if (!confirm(email + " の管理者権限を削除しますか？")) return;
  try {
    var data = await apiCall("GET", "/api/admin/roles");
    var admins = (data.admins || []).filter(function(e) { return e !== email; });

  } catch (e) { alert("削除に失敗しました"); }
}

// ============================
// Task management (admin)
// ============================
var PRIORITY_LABELS = { high: "高", medium: "中", low: "低" };
var CATEGORY_LABELS = { tsunagikomi: "つなぎこみ", sheet: "スプシ", number_match: "数字合わせ", asp: "ASP", other: "その他", teiki: "定期タスク", long_term: "長期タスク" };
var CATEGORY_ORDER = ["tsunagikomi", "sheet", "number_match", "asp", "other", "teiki", "long_term"];
var CATEGORY_COLORS = { tsunagikomi: "var(--accent)", sheet: "var(--green)", number_match: "var(--yellow)", asp: "var(--purple)", other: "var(--text2)", teiki: "var(--cyan)", long_term: "var(--orange)" };
var GENRE_MAP = { all: null, tsunagikomi: "tsunagikomi", sheet: "sheet", number_match: "number_match", asp: "asp", other: "other", teiki: "teiki", long_term: "long_term" };

var allTasks = [], peopleData = [], myId = null, apiError = null;
var displayMode = "status", selectedPersonId = null, selectedGenre = "all";
var tasksLoaded = false;

function normalizeCategory(cat) { return cat && CATEGORY_LABELS[cat] ? cat : "other"; }
function esc(s) { var d = document.createElement("div"); d.textContent = s || ""; return d.innerHTML; }
function today() { return new Date().toISOString().slice(0, 10); }
function dueClass(l) { if (!l) return ""; var diff = (new Date(l) - new Date(today())) / 86400000; return diff < 0 ? "overdue" : diff === 0 ? "due-today" : diff <= 2 ? "due-soon" : ""; }
function dueLabel(l) { if (!l) return "期限なし"; var diff = Math.round((new Date(l) - new Date(today())) / 86400000); return diff < 0 ? Math.abs(diff) + "日超過" : diff === 0 ? "今日" : diff === 1 ? "明日" : diff + "日後"; }
function cleanBody(body) { return (body || "").replace(/\[.*?\]/g, "").replace(/依頼がきました。対応お願いします！/g, "").replace(/【.*?】/g, "").trim().split("\n").filter(function(l) { return l.trim(); }).slice(0, 3).join("\n"); }

function setDisplayMode(mode) { displayMode = mode; document.querySelectorAll(".display-toggle button[data-mode]").forEach(function(b) { b.classList.toggle("active", b.dataset.mode === mode); }); renderAll(); }
function setGenre(genre) { selectedGenre = genre; document.querySelectorAll(".genre-btn").forEach(function(b) { b.classList.toggle("active", b.dataset.genre === genre); }); renderAll(); }
function setPerson(id) { selectedPersonId = id; document.querySelectorAll(".person-btn").forEach(function(b) { b.classList.toggle("active", Number(b.dataset.id) === id); }); loadAll(); }

async function updateTask(id, field, value) { await apiCall("POST", "/api/dashboard/tasks/" + id, { [field]: value }); }
function handleStatusChange(id, val) { updateTask(id, "localStatus", val); var t = allTasks.find(function(x) { return x.id === id; }); if (t) { t.localStatus = val; renderAll(); } }
function handleCategoryChange(id, val) { updateTask(id, "category", val); var t = allTasks.find(function(x) { return x.id === id; }); if (t) { t.category = val; renderAll(); } }

function editTitle(id, btn) {
  var task = allTasks.find(function(t) { return t.id === id; }); if (!task) return;
  var titleEl = btn.closest(".card-title-row").querySelector(".card-title");
  var input = document.createElement("input");
  input.type = "text"; input.value = task.title;
  input.style.cssText = "font-size:15px;font-weight:600;background:var(--surface2);border:1px solid var(--accent);color:var(--text);padding:2px 6px;border-radius:6px;width:100%;outline:none;";
  titleEl.replaceWith(input); input.focus(); input.select();
  function save() { var val = input.value.trim(); if (val && val !== task.title) { task.title = val; updateTask(id, "title", val); } renderAll(); }
  input.addEventListener("blur", save);
  input.addEventListener("keydown", function(e) { if (e.key === "Enter") input.blur(); if (e.key === "Escape") { input.value = task.title; input.blur(); } });
}

var currentModalId = null;
function openModal(id) {
  var task = allTasks.find(function(t) { return t.id === id; }); if (!task) return;
  currentModalId = id;
  document.getElementById("modalTitle").textContent = task.title;
  document.getElementById("modalMeta").innerHTML = '<span>' + (task.limit || "期限なし") + ' (' + dueLabel(task.limit) + ')</span><span>' + CATEGORY_LABELS[normalizeCategory(task.category)] + '</span>' + (task.assignedBy ? '<span>by ' + esc(task.assignedBy) + '</span>' : '');
  document.getElementById("modalBody").textContent = task.body || "(本文なし)";
  document.getElementById("modalActions").innerHTML =
    '<select onchange="handleStatusChange(\'' + id + '\',this.value);openModal(\'' + id + '\')"><option value="open"' + (task.localStatus==="open"?" selected":"") + '>未着手</option><option value="in_progress"' + (task.localStatus==="in_progress"?" selected":"") + '>着手中</option><option value="waiting"' + (task.localStatus==="waiting"?" selected":"") + '>相手待ち</option><option value="done"' + (task.localStatus==="done"?" selected":"") + '>完了</option></select>' +
    '<select onchange="handleCategoryChange(\'' + id + '\',this.value);openModal(\'' + id + '\')">' + CATEGORY_ORDER.map(function(k) { return '<option value="' + k + '"' + (normalizeCategory(task.category)===k?" selected":"") + '>' + CATEGORY_LABELS[k] + '</option>'; }).join("") + '</select>' +
    '<input type="text" placeholder="メモ..." value="' + esc(task.note) + '" onchange="updateTask(\'' + id + '\',\'note\',this.value);allTasks.find(function(t){return t.id===\'' + id + '\'}).note=this.value">';
  document.getElementById("taskModal").classList.remove("hidden");
}
function closeModal() { document.getElementById("taskModal").classList.add("hidden"); currentModalId = null; }
document.addEventListener("keydown", function(e) { if (e.key === "Escape" && currentModalId) closeModal(); });

function renderCard(t) {
  var dc = dueClass(t.limit), dl = dueLabel(t.limit), body = cleanBody(t.body);
  var deleteBtn = t.isManual ? '<button class="delete-task-btn" onclick="event.stopPropagation();deleteManualTask(\'' + t.id + '\')" title="削除">&#128465;</button>' : '';
  return '<div class="card ' + dc + '" onclick="openModal(\'' + t.id + '\')"><div class="card-top"><div class="card-title-row"><button class="edit-title-btn" onclick="event.stopPropagation();editTitle(\'' + t.id + '\',this)" title="編集">&#9998;</button><div class="card-title">' + esc(t.title) + '</div></div>' + deleteBtn + '<div class="card-priority ' + t.priority + '">' + (PRIORITY_LABELS[t.priority]||"中") + '</div></div><div class="card-meta"><span>' + (t.limit||"期限なし") + ' (' + dl + ')</span><span>' + CATEGORY_LABELS[normalizeCategory(t.category)] + '</span>' + (t.assignedBy?'<span>by ' + esc(t.assignedBy) + '</span>':'') + '</div>' + (body ? '<div class="card-body">' + esc(body) + '</div>' : '') + '<div class="card-actions" onclick="event.stopPropagation()"><select onchange="updateTask(\'' + t.id + '\',\'priority\',this.value);this.closest(\'.card\').querySelector(\'.card-priority\').className=\'card-priority \'+this.value;this.closest(\'.card\').querySelector(\'.card-priority\').textContent={high:\'高\',medium:\'中\',low:\'低\'}[this.value]"><option value="high"' + (t.priority==="high"?" selected":"") + '>高</option><option value="medium"' + (t.priority==="medium"?" selected":"") + '>中</option><option value="low"' + (t.priority==="low"?" selected":"") + '>低</option></select><select onchange="handleStatusChange(\'' + t.id + '\',this.value)"><option value="open"' + (t.localStatus==="open"?" selected":"") + '>未着手</option><option value="in_progress"' + (t.localStatus==="in_progress"?" selected":"") + '>着手中</option><option value="waiting"' + (t.localStatus==="waiting"?" selected":"") + '>相手待ち</option><option value="done"' + (t.localStatus==="done"?" selected":"") + '>完了</option></select><select onchange="handleCategoryChange(\'' + t.id + '\',this.value)">' + CATEGORY_ORDER.map(function(k){ return '<option value="' + k + '"' + (normalizeCategory(t.category)===k?" selected":"") + '>' + CATEGORY_LABELS[k] + '</option>'; }).join("") + '</select><input type="text" placeholder="メモ..." value="' + esc(t.note) + '" onchange="updateTask(\'' + t.id + '\',\'note\',this.value)"></div></div>';
}

// ============================
// Manual task add (modal popup)
// ============================
function addManualTask(category) {
  currentModalId = null;
  var label = CATEGORY_LABELS[category] || category;
  document.getElementById("modalTitle").textContent = label + "を追加";
  document.getElementById("modalMeta").innerHTML = '';
  document.getElementById("modalActions").innerHTML = '';

  var bodyHtml = '';
  bodyHtml += '<div class="modal-form-group"><label>タスク名</label><input type="text" id="addTaskTitle" placeholder="タスク名を入力"></div>';
  if (category === 'teiki') {
    bodyHtml += '<div class="modal-form-group"><label>頻度</label><select id="addTaskFreq"><option value="daily">毎日</option><option value="weekly">毎週</option><option value="biweekly">隔週</option><option value="monthly" selected>毎月</option></select></div>';
  } else {
    bodyHtml += '<div class="modal-form-group"><label>期日</label><input type="date" id="addTaskDeadline"></div>';
  }
  bodyHtml += '<div class="modal-form-group"><label>備考</label><textarea id="addTaskNote" placeholder="備考を入力（任意）" rows="3" style="padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-size:14px;resize:vertical;font-family:inherit;"></textarea></div>';
  bodyHtml += '<button class="modal-submit-btn" onclick="submitAddForm(\'' + category + '\')">追加する</button>';

  document.getElementById("modalBody").innerHTML = bodyHtml;
  document.getElementById("taskModal").classList.remove("hidden");
  setTimeout(function() { var inp = document.getElementById("addTaskTitle"); if (inp) inp.focus(); }, 100);
}

async function submitAddForm(category) {
  var title = document.getElementById("addTaskTitle").value.trim();
  if (!title) return;
  var noteEl = document.getElementById("addTaskNote");
  var data = { title: title, category: category, status: "open", note: noteEl ? noteEl.value.trim() : "" };
  if (category === "teiki") {
    data.frequency = document.getElementById("addTaskFreq").value;
    data.completedAt = null;
    data.nextDue = null;
  } else {
    var dl = document.getElementById("addTaskDeadline").value;
    data.deadline = dl || null;
    data.todos = [];
  }
  try {
    await apiCall("POST", "/api/dashboard/manual-tasks", data);
    closeModal();
    loadAll();
  } catch (e) { alert("追加に失敗しました: " + e.message); }
}

async function deleteManualTask(id) {
  if (!confirm("このタスクを削除しますか？")) return;
  try {
    await apiCall("DELETE", "/api/dashboard/manual-tasks/" + id, {});
    allTasks = allTasks.filter(function(t) { return t.id !== id; });
    renderAll();
  } catch (e) { alert("削除に失敗しました: " + e.message); }
}

// ============================
// 定期タスク: complete + recurrence
// ============================
var FREQ_LABELS = { daily: "毎日", weekly: "毎週", biweekly: "隔週", monthly: "毎月" };

function calculateNextDue(frequency) {
  var d = new Date();
  switch (frequency) {
    case "daily": d.setDate(d.getDate() + 1); break;
    case "weekly": d.setDate(d.getDate() + 7); break;
    case "biweekly": d.setDate(d.getDate() + 14); break;
    case "monthly": d.setMonth(d.getMonth() + 1); break;
  }
  return d.toISOString().slice(0, 10);
}

function checkTeikiRecurrence(t) {
  if (t.status === "done" && t.nextDue && new Date(today()) >= new Date(t.nextDue)) {
    t.status = "open";
    t.completedAt = null;
    t.nextDue = null;
    updateTask(t.id, "status", "open");
    updateTask(t.id, "completedAt", null);
    updateTask(t.id, "nextDue", null);
  }
}

async function toggleTeikiComplete(id) {
  var t = allTasks.find(function(x) { return x.id === id; });
  if (!t) return;
  if (t.status === "done") {
    t.status = "open"; t.completedAt = null; t.nextDue = null;
    await apiCall("POST", "/api/dashboard/tasks/" + id, { status: "open", completedAt: null, nextDue: null });
  } else {
    var nd = calculateNextDue(t.frequency || "monthly");
    t.status = "done"; t.completedAt = today(); t.nextDue = nd;
    await apiCall("POST", "/api/dashboard/tasks/" + id, { status: "done", completedAt: today(), nextDue: nd });
  }
  renderAll();
}

function renderTeikiCard(t) {
  checkTeikiRecurrence(t);
  var isDone = t.status === "done";
  var freqSelect = '<select class="status-select-inline" onchange="event.stopPropagation();updateTeikiFreq(\'' + t.id + '\',this.value)">';
  ["daily","weekly","biweekly","monthly"].forEach(function(f) {
    freqSelect += '<option value="' + f + '"' + (t.frequency === f ? ' selected' : '') + '>' + FREQ_LABELS[f] + '</option>';
  });
  freqSelect += '</select>';
  var noteHtml = t.note ? '<div class="card-body" style="margin-top:4px;font-size:12px;color:var(--text2);">' + esc(t.note) + '</div>' : '';
  return '<div class="card' + (isDone ? ' teiki-done' : '') + '" onclick="openTeikiModal(\'' + t.id + '\')"><div class="card-top"><button class="teiki-check' + (isDone ? ' done' : '') + '" onclick="event.stopPropagation();toggleTeikiComplete(\'' + t.id + '\')">' + (isDone ? '✓' : '') + '</button><div class="card-title" style="margin-left:8px;">' + esc(t.title) + '</div>' + freqSelect + '<button class="delete-task-btn" onclick="event.stopPropagation();deleteManualTask(\'' + t.id + '\')" title="削除">&#128465;</button></div>' + noteHtml + (isDone && t.nextDue ? '<div class="next-due">次回: ' + t.nextDue + '</div>' : '') + '</div>';
}

function openTeikiModal(id) {
  var t = allTasks.find(function(x) { return x.id === id; });
  if (!t) return;
  currentModalId = id;
  document.getElementById("modalTitle").textContent = t.title;
  var metaHtml = '<span>' + FREQ_LABELS[t.frequency || "monthly"] + '</span>';
  metaHtml += '<span>' + (t.status === "done" ? "完了" : "未完了") + '</span>';
  if (t.nextDue) metaHtml += '<span>次回: ' + t.nextDue + '</span>';
  document.getElementById("modalMeta").innerHTML = metaHtml;
  var bodyHtml = '<div class="modal-form-group"><label>備考</label><textarea id="teikiNoteEdit" rows="4" style="padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-size:14px;resize:vertical;font-family:inherit;">' + esc(t.note || '') + '</textarea></div>';
  bodyHtml += '<button class="modal-save-btn" onclick="saveTeikiNote(\'' + id + '\')">保存</button>';
  document.getElementById("modalBody").innerHTML = bodyHtml;
  document.getElementById("modalActions").innerHTML = '';
  document.getElementById("taskModal").classList.remove("hidden");
}

async function saveTeikiNote(id) {
  var t = allTasks.find(function(x) { return x.id === id; });
  if (!t) return;
  var val = document.getElementById("teikiNoteEdit").value.trim();
  t.note = val;
  await apiCall("POST", "/api/dashboard/tasks/" + id, { note: val });
  renderAll();
  closeModal();
}

async function updateTeikiFreq(id, val) {
  var t = allTasks.find(function(x) { return x.id === id; });
  if (t) { t.frequency = val; await apiCall("POST", "/api/dashboard/tasks/" + id, { frequency: val }); }
}

// ============================
// 長期タスク: deadline + todos
// ============================
var STATUS_LABELS_LT = { open: "未着手", in_progress: "着手中", done: "完了" };

function renderLongTermCard(t) {
  var todos = t.todos || [];
  var doneCount = todos.filter(function(x) { return x.status === "done" || x.done; }).length;
  var total = todos.length;
  var pct = total > 0 ? Math.round(doneCount / total * 100) : 0;
  var deadlineStr = t.deadline ? t.deadline : "期日未設定";
  var noteHtml = t.note ? '<div class="card-body" style="margin-top:4px;font-size:12px;color:var(--text2);">' + esc(t.note) + '</div>' : '';
  return '<div class="card" onclick="openLongTermModal(\'' + t.id + '\')"><div class="card-top"><div class="card-title">' + esc(t.title) + '</div><button class="delete-task-btn" onclick="event.stopPropagation();deleteManualTask(\'' + t.id + '\')" title="削除">&#128465;</button></div><div class="card-meta"><span>' + deadlineStr + '</span><span>' + (STATUS_LABELS_LT[t.status] || "未着手") + '</span></div>' + noteHtml + (total > 0 ? '<div class="todo-progress"><div class="todo-progress-text">やること: ' + doneCount + '/' + total + ' 完了</div><div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div></div>' : '') + '</div>';
}

var TODO_STATUSES = { open: "未着手", in_progress: "着手中", done: "完了" };

function openLongTermModal(id) {
  var t = allTasks.find(function(x) { return x.id === id; });
  if (!t) return;
  currentModalId = id;
  document.getElementById("modalTitle").textContent = t.title;
  var todos = t.todos || [];

  var metaHtml = '<span>' + (t.deadline || "期日未設定") + '</span>';
  metaHtml += '<select class="status-select-inline" onchange="updateLongTermField(\'' + id + '\',\'status\',this.value)">';
  ["open","in_progress","done"].forEach(function(s) {
    metaHtml += '<option value="' + s + '"' + (t.status === s ? ' selected' : '') + '>' + STATUS_LABELS_LT[s] + '</option>';
  });
  metaHtml += '</select>';
  document.getElementById("modalMeta").innerHTML = metaHtml;

  var bodyHtml = '<h3 style="font-size:14px;margin-bottom:10px;color:var(--text);">やること</h3>';
  bodyHtml += '<div class="todo-list" id="todoListArea">';
  if (todos.length === 0) {
    bodyHtml += '<div style="color:var(--text2);font-size:13px;padding:8px 0;">まだ追加されていません</div>';
  }
  todos.forEach(function(item, idx) {
    var isDone = item.status === "done";
    bodyHtml += '<div class="todo-item' + (isDone ? ' todo-done' : '') + '">';
    bodyHtml += '<span class="todo-text">' + esc(item.text) + '</span>';
    bodyHtml += '<input type="date" class="todo-date-input" value="' + (item.date || "") + '" onchange="changeTodoField(\'' + id + '\',' + idx + ',\'date\',this.value)">';
    bodyHtml += '<select class="todo-status-select" onchange="changeTodoField(\'' + id + '\',' + idx + ',\'status\',this.value)">';
    ["open","in_progress","done"].forEach(function(s) {
      bodyHtml += '<option value="' + s + '"' + ((item.status || "open") === s ? ' selected' : '') + '>' + TODO_STATUSES[s] + '</option>';
    });
    bodyHtml += '</select>';
    bodyHtml += '<button class="todo-delete-btn" onclick="removeTodoItem(\'' + id + '\',' + idx + ')" title="削除">&#128465;</button>';
    bodyHtml += '</div>';
  });
  bodyHtml += '</div>';
  bodyHtml += '<div class="todo-add"><input type="text" id="todoNewText" placeholder="やることを入力" onkeydown="if(event.key===\'Enter\')addTodoItemLocal(\'' + id + '\')"><button onclick="addTodoItemLocal(\'' + id + '\')">追加</button></div>';
  bodyHtml += '<h3 style="font-size:14px;margin:20px 0 10px;color:var(--text);">備考</h3>';
  bodyHtml += '<textarea id="longTermNoteEdit" rows="3" style="width:100%;box-sizing:border-box;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-size:14px;resize:vertical;font-family:inherit;">' + esc(t.note || '') + '</textarea>';
  bodyHtml += '<button class="modal-save-btn" onclick="saveLongTermTodos(\'' + id + '\')">保存</button>';
  document.getElementById("modalBody").innerHTML = bodyHtml;
  document.getElementById("modalActions").innerHTML = '';
  document.getElementById("taskModal").classList.remove("hidden");
}

function updateLongTermField(id, field, val) {
  var t = allTasks.find(function(x) { return x.id === id; });
  if (t) t[field] = val;
}

function addTodoItemLocal(taskId) {
  var inp = document.getElementById("todoNewText");
  var text = inp.value.trim();
  if (!text) return;
  var t = allTasks.find(function(x) { return x.id === taskId; });
  if (!t) return;
  if (!t.todos) t.todos = [];
  t.todos.push({ text: text, date: today(), status: "open" });
  openLongTermModal(taskId);
}

function changeTodoField(taskId, idx, field, val) {
  var t = allTasks.find(function(x) { return x.id === taskId; });
  if (!t || !t.todos || !t.todos[idx]) return;
  t.todos[idx][field] = val;
}

function removeTodoItem(taskId, idx) {
  var t = allTasks.find(function(x) { return x.id === taskId; });
  if (!t || !t.todos) return;
  t.todos.splice(idx, 1);
  openLongTermModal(taskId);
}

async function saveLongTermTodos(taskId) {
  var t = allTasks.find(function(x) { return x.id === taskId; });
  if (!t) return;
  var noteEl = document.getElementById("longTermNoteEdit");
  if (noteEl) t.note = noteEl.value.trim();
  try {
    await apiCall("POST", "/api/dashboard/tasks/" + taskId, { status: t.status, todos: t.todos || [], note: t.note || "" });
    renderAll();
    closeModal();
  } catch (e) { alert("保存に失敗しました: " + e.message); }
}

function renderSection(title, tasks, dotColor, categoryKey) {
  if (!tasks.length && categoryKey !== "teiki" && categoryKey !== "long_term") return "";
  var addBtn = (categoryKey === "teiki" || categoryKey === "long_term") ? '<button class="add-task-btn" onclick="addManualTask(\'' + categoryKey + '\')">＋ 追加</button>' : '';
  return '<div class="section"><div class="section-header"><div class="section-dot" style="background:' + dotColor + '"></div><h2>' + title + '</h2><span class="section-count">' + tasks.length + '</span>' + addBtn + '</div><div class="cards">' + tasks.map(renderCard).join("") + '</div></div>';
}

function renderAll() {
  var isManualGenre = selectedGenre === "teiki" || selectedGenre === "long_term";
  document.getElementById("displayToggle").style.display = isManualGenre ? "none" : "flex";

  var tasksToShow = allTasks;
  if (GENRE_MAP[selectedGenre]) tasksToShow = allTasks.filter(function(t) { return normalizeCategory(t.category) === GENRE_MAP[selectedGenre]; });

  var ps = function(a, b) { var m = { high: 0, medium: 1, low: 2 }; return (m[a.priority] ?? 1) - (m[b.priority] ?? 1); };
  var html = "";

  if (isManualGenre) {
    var addBtn = '<button class="add-task-btn" onclick="addManualTask(\'' + selectedGenre + '\')">＋ 追加</button>';
    var cardRenderer = selectedGenre === "teiki" ? renderTeikiCard : renderLongTermCard;

    var activeTasks = tasksToShow.filter(function(t) { return t.status !== "done"; });
    var doneTasks = tasksToShow.filter(function(t) { return t.status === "done"; });

    html = '<div class="section"><div class="section-header"><div class="section-dot" style="background:' + CATEGORY_COLORS[selectedGenre] + '"></div><h2>' + CATEGORY_LABELS[selectedGenre] + '</h2><span class="section-count">' + tasksToShow.length + '</span>' + addBtn + '</div><div class="cards">' + activeTasks.map(cardRenderer).join("") + '</div></div>';
    if (doneTasks.length) {
      html += '<div class="section"><div class="section-header"><div class="section-dot" style="background:var(--green)"></div><h2>完了</h2><span class="section-count">' + doneTasks.length + '</span></div><div class="cards">' + doneTasks.map(cardRenderer).join("") + '</div></div>';
    }
  } else {
    var active = tasksToShow.filter(function(t) { return t.localStatus !== "done"; });
    var done = tasksToShow.filter(function(t) { return t.localStatus === "done"; });
    if (displayMode === "category") {
      html = CATEGORY_ORDER.map(function(cat) { var t = active.filter(function(x) { return normalizeCategory(x.category) === cat; }); t.sort(ps); return renderSection(CATEGORY_LABELS[cat], t, CATEGORY_COLORS[cat], cat); }).join("") + (done.length ? renderSection("完了", done, "var(--green)") : "");
    } else {
      var o = tasksToShow.filter(function(t) { return t.localStatus === "open"; }); o.sort(ps);
      var ip = tasksToShow.filter(function(t) { return t.localStatus === "in_progress"; }); ip.sort(ps);
      var w = tasksToShow.filter(function(t) { return t.localStatus === "waiting"; }); w.sort(ps);
      html = [renderSection("未着手", o, "var(--text2)"), renderSection("着手中", ip, "var(--accent)"), renderSection("相手待ち", w, "var(--yellow)"), done.length ? renderSection("完了", done, "var(--green)") : ""].join("");
    }
  }

  if (!html.trim()) {
    html = apiError ? '<div class="empty-state">Chatworkからタスクを取得できませんでした。</div>'
      : isManualGenre ? '<div class="empty-state"><button class="add-task-btn" style="font-size:14px;padding:10px 24px;" onclick="addManualTask(\'' + selectedGenre + '\')">＋ ' + CATEGORY_LABELS[selectedGenre] + 'を追加</button></div>'
      : allTasks.length === 0 ? '<div class="empty-state" style="font-size:18px;">タスクがありません。おめでとうございます\uD83C\uDF89\u2728</div>'
      : '<div class="empty-state">「' + esc(CATEGORY_LABELS[selectedGenre]||selectedGenre) + '」に該当するタスクはありません。</div>';
  }
  document.getElementById("app").innerHTML = html;
}

var PERSON_COLORS = { "\u7B52\u4E95": "#b8e986", "\u53CB\u5229": "#ffb3d9", "\u77F3\u7530": "#87ceeb" };
function renderPersonButtons() {
  var row = document.getElementById("personRow");
  var people = peopleData.length > 0 ? peopleData : [{ name: "\u7B52\u4E95", id: 0 }, { name: "\u53CB\u5229", id: 0 }, { name: "\u77F3\u7530", id: 0 }];
  var activeId = selectedPersonId != null ? selectedPersonId : (myId != null ? myId : (people[0] ? people[0].id : null));
  row.innerHTML = people.map(function(p) {
    var color = PERSON_COLORS[p.name] || "var(--accent)";
    return '<button class="person-btn ' + (p.id === activeId ? "active" : "") + '" data-id="' + p.id + '" style="--person-color:' + color + '" onclick="setPerson(' + p.id + ')">' + esc(p.name) + '</button>';
  }).join("");
}

async function loadAll() {
  var btn = document.getElementById("reloadBtn");
  btn.disabled = true; btn.innerHTML = "&#x23F3;";
  apiError = null;
  document.getElementById("apiErrorBanner").style.display = "none";
  try {
    var params = [];
    if (selectedPersonId != null) params.push("accountId=" + selectedPersonId);
    params.push("_t=" + Date.now());

    var tasksPromise = apiCall("GET", "/api/dashboard/tasks?" + params.join("&"));
    var peoplePromise = apiCall("GET", "/api/people").catch(function() { return { people: [], myId: null }; });
    var results = await Promise.all([tasksPromise, peoplePromise]);
    var tasksJson = results[0];
    var peopleJson = results[1];

    if (Array.isArray(tasksJson)) allTasks = tasksJson;
    else { apiError = tasksJson.error || "取得失敗"; allTasks = []; }

    peopleData = Array.isArray(peopleJson.people) ? peopleJson.people : [];
    myId = peopleJson.myId != null ? peopleJson.myId : null;
    if (selectedPersonId == null && peopleData.length > 0) selectedPersonId = myId != null ? myId : (peopleData[0] ? peopleData[0].id : null);
    renderPersonButtons(); renderAll(); tasksLoaded = true;
    document.getElementById("lastUpdated").textContent = "最終更新: " + new Date().toLocaleTimeString("ja-JP");
    var sel = peopleData.find(function(p) { return p.id === selectedPersonId; });
    if (apiError) { document.getElementById("apiErrorBanner").textContent = "Chatwork: " + apiError; document.getElementById("apiErrorBanner").style.display = "block"; }
  } catch (err) {
    document.getElementById("app").innerHTML = '<div class="empty-state" style="color:var(--red);">読み込みエラー: ' + esc(err.message) + '</div>';
  } finally { btn.disabled = false; btn.innerHTML = "&#x21bb;"; }
}

function hide(id) { document.getElementById(id).classList.add("hidden"); }

document.addEventListener("DOMContentLoaded", function() {
  initGoogleSignIn();
  renderCategories();
});
